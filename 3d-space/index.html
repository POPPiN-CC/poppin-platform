<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>POPPiN — 3D space (Canopy)</title>
<style>
  html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#000;color:#fff;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}

  /* Phone-shaped frame: fills the screen on an actual phone, letterboxed on wide desktop viewports */
  #app{position:relative;width:100%;height:100dvh;max-width:430px;margin:0 auto;overflow:hidden;
    background:#1a1a1a;box-shadow:0 0 60px rgba(0,0,0,0.6)}
  #app canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

  #banner{position:absolute;top:calc(12px + env(safe-area-inset-top));left:12px;right:12px;z-index:10;
    background:rgba(0,0,0,0.7);border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.5}
  #banner b{color:#DE5B3E}
  #banner .state-tag{display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;
    padding:2px 8px;border-radius:999px;margin-right:8px;background:#333}
  #app.state-inside #banner .state-tag{background:#2e7d32}
  #app.state-near #banner .state-tag{background:#a15b00}
  #app.state-far #banner .state-tag{background:#444}
  #app.state-denied #banner .state-tag{background:#7a1f1f}

  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:#111;z-index:30;font-size:14px;color:#aaa;text-align:center;padding:0 24px}

  #dev-status{position:absolute;bottom:calc(12px + env(safe-area-inset-bottom));left:12px;z-index:10;
    background:rgba(0,0,0,0.75);border-radius:10px;padding:10px 14px;font-size:11px;
    font-family:Consolas,monospace;max-width:60%}

  #manual-entry{position:absolute;bottom:calc(56px + env(safe-area-inset-bottom));right:12px;z-index:15;
    background:rgba(0,0,0,0.9);border-radius:10px;padding:14px;font-size:13px;width:min(240px, 70vw)}
  #manual-entry.hidden{display:none}
  #manual-entry h4{margin:0 0 8px;font-size:12px;color:#DE5B3E}
  #manual-entry input{width:100%;box-sizing:border-box;margin-bottom:8px;padding:10px;border-radius:8px;
    border:1px solid #444;background:#1a1a1a;color:#fff;font-size:13px}
  #manual-entry button{width:100%;margin-top:6px;padding:11px;border:0;border-radius:8px;
    background:#DE5B3E;color:#fff;font-size:13px;cursor:pointer}
  #manual-entry button.secondary{background:#333}
  #manual-toggle{position:absolute;bottom:calc(12px + env(safe-area-inset-bottom));
    right:calc(12px + env(safe-area-inset-right));z-index:16;background:#222;border:1px solid #444;
    color:#fff;border-radius:10px;padding:11px 14px;font-size:13px;cursor:pointer}

  /* Bottom-sheet pin modal, easier to reach one-handed than a centered dialog */
  #pin-modal{position:absolute;inset:0;z-index:25;background:rgba(0,0,0,0.6);display:flex;
    align-items:flex-end;justify-content:center}
  #pin-modal.hidden{display:none}
  #pin-modal .inner{background:#1a1a1a;border-radius:16px 16px 0 0;padding:20px;width:100%;
    box-sizing:border-box;border-top:1px solid #333;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
  #pin-modal h3{margin:0 0 12px;font-size:15px}
  #pin-modal .type-row{display:flex;gap:8px;margin-bottom:12px}
  #pin-modal .type-row button{flex:1;padding:12px 4px;border-radius:10px;border:1px solid #444;
    background:#222;color:#fff;font-size:13px;cursor:pointer}
  #pin-modal .type-row button.active{border-color:#DE5B3E;background:#3a2018}
  #pin-modal .type-row button:disabled{opacity:0.4;cursor:not-allowed}
  #pin-modal .emoji-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  #pin-modal .emoji-row button{font-size:20px;background:#222;border:1px solid #444;border-radius:8px;
    padding:8px 10px;cursor:pointer}
  #pin-modal input{width:100%;box-sizing:border-box;padding:12px;border-radius:8px;border:1px solid #444;
    background:#111;color:#fff;font-size:14px;margin-bottom:12px}
  #pin-modal .actions{display:flex;gap:10px}
  #pin-modal .actions button{flex:1;padding:12px;border-radius:8px;border:0;cursor:pointer;font-size:14px}
  #pin-modal .actions .save{background:#DE5B3E;color:#fff}
  #pin-modal .actions .cancel{background:#333;color:#fff}

  #pin-info{position:absolute;left:50%;bottom:100px;transform:translateX(-50%);z-index:12;
    background:rgba(0,0,0,0.85);border-radius:10px;padding:10px 16px;font-size:13px;max-width:85%;
    text-align:center;display:none}
</style>
</head>
<body>
<div id="app" class="state-waiting">

<div id="loading">Loading Canopy scan…</div>

<div id="banner">
  <span class="state-tag" id="state-tag">checking</span>
  <span id="banner-text"><b>POPPiN 3D space.</b> Asking your browser for your location to see whether you're inside the Canopy POPS…</span>
</div>

<div id="dev-status">state: waiting</div>

<div id="pin-info"></div>

<button id="manual-toggle">🛠 Manual location</button>
<div id="manual-entry" class="hidden">
  <h4>Manual location (test / admin)</h4>
  <input id="manual-lat" placeholder="Latitude, e.g. 40.755185" />
  <input id="manual-lng" placeholder="Longitude, e.g. -73.956320" />
  <button id="manual-check">Check this location</button>
  <button id="manual-force" class="secondary">Force "inside" (skip check)</button>
  <button id="manual-clear" class="secondary">Clear override</button>
</div>

<div id="pin-modal" class="hidden">
  <div class="inner">
    <h3>Add to this spot</h3>
    <div class="type-row">
      <button data-type="note" class="active">📝 Note</button>
      <button data-type="emoji">😀 Emoji</button>
      <button data-type="photo" id="photo-type-btn" disabled title="Configure Supabase to enable photo pins">📷 Photo</button>
    </div>
    <div class="emoji-row" id="emoji-row" style="display:none">
      <button type="button">👍</button><button type="button">❤️</button><button type="button">😮</button>
      <button type="button">🎉</button><button type="button">☕</button><button type="button">🌳</button>
      <button type="button">🎵</button><button type="button">📚</button>
    </div>
    <input type="file" id="pin-photo-input" accept="image/*" style="display:none">
    <input id="pin-text" placeholder="Say something about this spot…" />
    <div class="actions">
      <button class="cancel" id="pin-cancel">Cancel</button>
      <button class="save" id="pin-save">Save</button>
    </div>
  </div>
</div>

</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

const NEAR_RADIUS_METERS = 100;
const PINS_KEY = 'poppin_3d_pins_canopy';
const SCAN_ID = 'canopy';

// Fill these in once the Supabase project exists (Project Settings -> API).
// Until then this falls back to localStorage so the prototype still works standalone.
const SUPABASE_URL = 'fiigjpvnldjwfadfkurg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWdqcHZubGRqd2ZhZGZrdXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NTU2NDQsImV4cCI6MjEwMDIzMTY0NH0.1Jbdo3ItPScvlJIW2fF2Wjkuv3hQh0S0dThxSnpsik8';

const supabaseClient = SUPABASE_URL.includes('YOUR-PROJECT')
  ? null
  : supabase.createClient('https://' + SUPABASE_URL, SUPABASE_ANON_KEY);

const appEl = document.getElementById('app');

// ---------- three.js scene (always mounted, contribution is gated by state) ----------

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(60, appEl.clientWidth / appEl.clientHeight, 0.01, 1000);
camera.position.set(3, 3, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(appEl.clientWidth, appEl.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
appEl.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

let scanRoot = null;
const pinMarkers = [];

// Fit the camera to the loaded object accounting for the current (often narrow/portrait) aspect ratio,
// so a wide scan isn't clipped on a phone screen the way a fixed offset would clip it.
function frameCameraToSize(size) {
  const maxSize = Math.max(size.x, size.y, size.z);
  const fitOffset = 1.3;
  const fitHeightDistance = maxSize / (2 * Math.tan((Math.PI * camera.fov) / 360));
  const fitWidthDistance = fitHeightDistance / camera.aspect;
  const distance = fitOffset * Math.max(fitHeightDistance, fitWidthDistance);
  const direction = new THREE.Vector3(1, 0.75, 1).normalize();
  camera.position.copy(direction.multiplyScalar(distance));
  camera.near = Math.max(distance / 100, 0.01);
  camera.far = distance * 100;
  camera.updateProjectionMatrix();
  controls.target.set(0, 0, 0);
  controls.update();
}

const loader = new GLTFLoader();
loader.setMeshoptDecoder(MeshoptDecoder);
loader.load('../Assets/Scans/Canopy.glb', (gltf) => {
  scanRoot = gltf.scene;
  scene.add(scanRoot);

  const box = new THREE.Box3().setFromObject(scanRoot);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  scanRoot.position.sub(center);
  frameCameraToSize(size);

  document.getElementById('loading').style.display = 'none';
  loadStoredPins();
}, (progress) => {
  if (progress.total) {
    const pct = Math.round((progress.loaded / progress.total) * 100);
    document.getElementById('loading').textContent = 'Loading Canopy scan… ' + pct + '%';
  }
}, (error) => {
  document.getElementById('loading').textContent = 'Could not load the scan. Check the console for details.';
  console.error(error);
});

function makeNoteMarker() {
  return new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xDE5B3E })
  );
}

function makeEmojiMarker(emoji) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = '96px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 64, 72);
  const texture = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false }));
  sprite.scale.set(0.15, 0.15, 0.15);
  return sprite;
}

function addPinToScene(pin) {
  const marker = pin.type === 'emoji' ? makeEmojiMarker(pin.text)
    : pin.type === 'photo' ? makeEmojiMarker('📷')
    : makeNoteMarker();
  marker.position.set(pin.x, pin.y, pin.z);
  marker.userData.pin = pin;
  scene.add(marker);
  pinMarkers.push(marker);
}

async function loadStoredPins() {
  const pins = await getStoredPins();
  pins.forEach(addPinToScene);
}

async function getStoredPins() {
  if (supabaseClient) {
    const { data, error } = await supabaseClient
      .from('scan_pins')
      .select('*')
      .eq('scan_id', SCAN_ID);
    if (error) { console.error(error); return []; }
    return data.map(row => ({
      id: row.id, type: row.type, text: row.text, storagePath: row.storage_path,
      x: row.x, y: row.y, z: row.z, createdAt: new Date(row.created_at).getTime()
    }));
  }
  try {
    return JSON.parse(localStorage.getItem(PINS_KEY) || '[]');
  } catch (e) {
    return [];
  }
}

async function savePin(pin) {
  if (supabaseClient) {
    const { error } = await supabaseClient.from('scan_pins').insert({
      scan_id: SCAN_ID, type: pin.type, text: pin.text, storage_path: pin.storagePath || null,
      x: pin.x, y: pin.y, z: pin.z
    });
    if (error) console.error(error);
    return;
  }
  const pins = JSON.parse(localStorage.getItem(PINS_KEY) || '[]');
  pins.push(pin);
  localStorage.setItem(PINS_KEY, JSON.stringify(pins));
}

// ---------- tap handling: view an existing pin, or place a new one when allowed ----------

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const pinInfoEl = document.getElementById('pin-info');
let pendingPoint = null;

function canContribute() {
  return currentState === 'inside';
}

function showPinInfo(marker) {
  const pin = marker.userData.pin;
  const when = new Date(pin.createdAt).toLocaleString();
  const prefix = pin.type === 'emoji' ? pin.text + ' ' : pin.type === 'photo' ? '📷 ' : '📝 ';
  pinInfoEl.textContent = prefix + (pin.text || '(photo)') + '  ·  ' + when;
  pinInfoEl.style.display = 'block';
  clearTimeout(showPinInfo._t);
  showPinInfo._t = setTimeout(() => { pinInfoEl.style.display = 'none'; }, 4000);
}

function flashLocked() {
  pinInfoEl.textContent = "You can only add to the space while you're inside the POPS.";
  pinInfoEl.style.display = 'block';
  clearTimeout(showPinInfo._t);
  showPinInfo._t = setTimeout(() => { pinInfoEl.style.display = 'none'; }, 2500);
}

// Pointer coordinates are relative to the canvas's own bounding box, not the window —
// the canvas is confined to the phone-frame container and may not fill the viewport.
function setPointerFromEvent(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
}

function handleTap(clientX, clientY) {
  setPointerFromEvent(clientX, clientY);
  raycaster.setFromCamera(pointer, camera);

  const markerHits = raycaster.intersectObjects(pinMarkers, true);
  if (markerHits.length) {
    showPinInfo(markerHits[0].object);
    return;
  }

  if (!scanRoot) return;

  if (!canContribute()) {
    const surfaceHit = raycaster.intersectObject(scanRoot, true);
    if (surfaceHit.length) flashLocked();
    return;
  }

  const hits = raycaster.intersectObject(scanRoot, true);
  if (!hits.length) return;
  openPinModal(hits[0].point);
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  renderer.domElement.dataset.downX = e.clientX;
  renderer.domElement.dataset.downY = e.clientY;
});
renderer.domElement.addEventListener('pointerup', (e) => {
  const dx = Math.abs(e.clientX - renderer.domElement.dataset.downX);
  const dy = Math.abs(e.clientY - renderer.domElement.dataset.downY);
  if (dx < 4 && dy < 4) handleTap(e.clientX, e.clientY);
});

// Watch the phone-frame container itself, not the window — on wide desktop viewports the
// container stays pinned at max-width regardless of window resizes, so a window listener
// alone would miss real size changes (and would falsely fire on ones that don't matter).
new ResizeObserver(() => {
  const w = appEl.clientWidth, h = appEl.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}).observe(appEl);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ---------- pin modal ----------

const pinModal = document.getElementById('pin-modal');
const pinText = document.getElementById('pin-text');
const emojiRow = document.getElementById('emoji-row');
const photoInput = document.getElementById('pin-photo-input');
let selectedType = 'note';
let selectedPhotoFile = null;

document.getElementById('photo-type-btn').disabled = !supabaseClient;
document.getElementById('photo-type-btn').title = supabaseClient
  ? 'Attach a photo to this spot'
  : 'Configure Supabase to enable photo pins';

function openPinModal(point) {
  pendingPoint = point;
  selectedType = 'note';
  selectedPhotoFile = null;
  pinText.value = '';
  pinText.placeholder = 'Say something about this spot…';
  emojiRow.style.display = 'none';
  document.querySelectorAll('#pin-modal .type-row button').forEach(b => b.classList.toggle('active', b.dataset.type === 'note'));
  pinModal.classList.remove('hidden');
  pinText.focus();
}

document.querySelectorAll('#pin-modal .type-row button[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    selectedType = btn.dataset.type;
    document.querySelectorAll('#pin-modal .type-row button').forEach(b => b.classList.toggle('active', b === btn));
    emojiRow.style.display = selectedType === 'emoji' ? 'flex' : 'none';
    if (selectedType === 'photo') {
      pinText.placeholder = 'Optional caption…';
      photoInput.click();
    } else {
      selectedPhotoFile = null;
      pinText.placeholder = selectedType === 'emoji' ? 'Pick an emoji below, or type one…' : 'Say something about this spot…';
    }
  });
});

photoInput.addEventListener('change', (e) => {
  selectedPhotoFile = e.target.files[0] || null;
});

emojiRow.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => { pinText.value = btn.textContent; });
});

document.getElementById('pin-cancel').addEventListener('click', () => {
  pinModal.classList.add('hidden');
  pendingPoint = null;
});

document.getElementById('pin-save').addEventListener('click', async () => {
  if (!pendingPoint) { pinModal.classList.add('hidden'); return; }

  if (selectedType === 'photo') {
    if (!selectedPhotoFile || !supabaseClient) { pinModal.classList.add('hidden'); return; }
    const path = SCAN_ID + '/' + Date.now() + '_' + selectedPhotoFile.name;
    const { error: uploadError } = await supabaseClient.storage.from('scan-media').upload(path, selectedPhotoFile);
    if (uploadError) { console.error(uploadError); pinModal.classList.add('hidden'); return; }
    const pin = {
      id: 'pin_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      type: 'photo', text: pinText.value.trim(), storagePath: path,
      x: pendingPoint.x, y: pendingPoint.y, z: pendingPoint.z, createdAt: Date.now()
    };
    addPinToScene(pin);
    savePin(pin);
    pinModal.classList.add('hidden');
    pendingPoint = null;
    return;
  }

  const text = pinText.value.trim();
  if (!text) { pinModal.classList.add('hidden'); return; }
  const pin = {
    id: 'pin_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    type: selectedType,
    text,
    x: pendingPoint.x, y: pendingPoint.y, z: pendingPoint.z,
    createdAt: Date.now()
  };
  savePin(pin);
  addPinToScene(pin);
  pinModal.classList.add('hidden');
  pendingPoint = null;
});

// ---------- geolocation + geofence state ----------

const bannerText = document.getElementById('banner-text');
const stateTag = document.getElementById('state-tag');
const devStatus = document.getElementById('dev-status');

let popsPolygon = null;
let currentState = 'waiting';
let manualOverrideState = null; // set by the "force inside" admin backdoor

const STATE_COPY = {
  waiting: '<b>POPPiN 3D space.</b> Asking your browser for your location to see whether you\'re inside the Canopy POPS…',
  denied: '<b>Location unavailable.</b> Use manual entry (bottom right) to test the space, or move somewhere your device can get a GPS fix.',
  inside: '<b>You\'re inside.</b> Tap the model to add a note or emoji tied to that exact spot.',
  near: '<b>You\'re close by</b> (within ' + NEAR_RADIUS_METERS + 'm) but not inside yet. Viewing only — step inside to add content.',
  far: '<b>You\'re outside this POPS.</b> Viewing the space and what others have added so far.'
};

function applyState(state, meta) {
  const effective = manualOverrideState || state;
  currentState = effective;
  appEl.className = 'state-' + effective;
  stateTag.textContent = effective;
  bannerText.innerHTML = STATE_COPY[effective] || '';
  devStatus.textContent = 'state: ' + effective +
    (meta && meta.latitude !== undefined ? '  ·  lat ' + meta.latitude.toFixed(5) + ', lng ' + meta.longitude.toFixed(5) : '') +
    (meta && meta.accuracy !== undefined ? '  ·  ±' + Math.round(meta.accuracy) + 'm' : '') +
    (manualOverrideState ? '  ·  manual override active' : '');
}

function decideState(lat, lng) {
  if (!popsPolygon) return 'far';
  const point = turf.point([lng, lat]);
  if (turf.booleanPointInPolygon(point, popsPolygon)) return 'inside';
  const buffered = turf.buffer(popsPolygon, NEAR_RADIUS_METERS, { units: 'meters' });
  if (turf.booleanPointInPolygon(point, buffered)) return 'near';
  return 'far';
}

function onGeoSuccess(pos) {
  const { latitude, longitude, accuracy } = pos.coords;
  applyState(decideState(latitude, longitude), { latitude, longitude, accuracy });
}

function onGeoError(err) {
  applyState('denied', {});
  console.warn('Geolocation error:', err && err.message);
}

function startGeolocation() {
  if (!navigator.geolocation) { onGeoError({ message: 'Geolocation not supported' }); return; }
  navigator.geolocation.watchPosition(onGeoSuccess, onGeoError, {
    enableHighAccuracy: true, timeout: 10000, maximumAge: 30000
  });
}

fetch('../Assets/GIS/Canopy.geojson')
  .then(r => r.json())
  .then(fc => { popsPolygon = fc.features[0]; startGeolocation(); })
  .catch(() => { applyState('denied', {}); });

// ---------- manual entry / admin backdoor ----------

const manualPanel = document.getElementById('manual-entry');
document.getElementById('manual-toggle').addEventListener('click', () => {
  manualPanel.classList.toggle('hidden');
});

document.getElementById('manual-check').addEventListener('click', () => {
  const lat = parseFloat(document.getElementById('manual-lat').value);
  const lng = parseFloat(document.getElementById('manual-lng').value);
  if (Number.isNaN(lat) || Number.isNaN(lng)) return;
  manualOverrideState = null;
  applyState(decideState(lat, lng), { latitude: lat, longitude: lng });
});

document.getElementById('manual-force').addEventListener('click', () => {
  manualOverrideState = 'inside';
  applyState('inside', {});
});

document.getElementById('manual-clear').addEventListener('click', () => {
  manualOverrideState = null;
  applyState(currentState, {});
  startGeolocation();
});
</script>
</body>
</html>
