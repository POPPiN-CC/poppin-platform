<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>POPPIN — what's poppin in your neighborhood?</title>
<style>
  :root{
    --teal:#0F5257; --teal-dark:#0A3B3F; --sand:#EDE6DA; --terracotta:#C1502E;
    --ink:#1E2B2A; --cream:#FBF8F3; --muted:#5C6B69; --border:#E3DDD0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--cream);color:var(--ink)}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff}
  .header{padding:16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border)}
  .search{flex:1;display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:10px;padding:10px 12px}
  .search input{border:none;background:transparent;font-size:14px;flex:1;outline:none}
  .list{padding:12px 16px}
  .card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--cream);border-radius:10px;margin-bottom:8px;cursor:pointer;border:none;width:100%;text-align:left}
  .card .icon{width:44px;height:44px;border-radius:10px;background:var(--sand);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
  .card .name{font-weight:600;font-size:14px;margin:0}
  .card .meta{font-size:12px;color:var(--muted);margin:2px 0 0}
  .badge{font-size:11px;padding:3px 8px;border-radius:6px;white-space:nowrap;margin-left:auto}
  .badge.open{background:#E1F5EE;color:#085041}
  .profile{padding:16px}
  .backbtn{background:none;border:none;font-size:20px;cursor:pointer;padding:0 12px 0 0}
  .h1{font-size:18px;font-weight:600;margin:0}
  .sub{font-size:13px;color:var(--muted);margin:2px 0 0}
  .section{margin:20px 0}
  .section h3{font-size:13px;font-weight:600;margin:0 0 10px;color:var(--muted)}
  .bar{height:6px;border-radius:3px;background:var(--border);position:relative;overflow:hidden;margin-bottom:12px}
  .bar span{position:absolute;left:0;top:0;bottom:0;border-radius:3px;background:var(--teal);transition:width .4s ease}
  .barlabel{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--muted)}
  .chiprow{display:flex;gap:6px;margin-bottom:10px}
  .chip{flex:1;font-size:12px;padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;text-align:center}
  .chip.sel{background:var(--teal);color:#fff;border-color:var(--teal)}
  .btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--teal);color:#fff}
  .btn.secondary{background:var(--cream);color:var(--ink);border:1px solid var(--border)}
  .wishtag{border-radius:20px;border:1px solid var(--border);background:var(--cream);cursor:pointer;padding:6px 12px;font-size:12px;margin:0 6px 6px 0}
  .wishwrap{display:flex;flex-wrap:wrap}
  .confirm{font-size:12px;color:var(--teal);height:16px;margin:8px 0 0}
  #traceSvg{width:100%;border-radius:12px;background:var(--cream);margin-bottom:8px}
  .uploadrow{display:flex;gap:8px}
  .uploadbtn{flex:1;padding:10px;border-radius:10px;border:1px dashed var(--border);background:var(--cream);font-size:12px;text-align:center;cursor:pointer}
  input[type=file]{display:none}
  .empty{font-size:13px;color:var(--muted);padding:20px 0;text-align:center}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="search">
      <span>🔍</span>
      <input id="searchBox" placeholder="What's poppin near me?" oninput="onSearch()"/>
    </div>
  </div>
  <div id="listView" class="list"></div>
  <div id="profileView" class="profile" style="display:none"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ---- Fill these in from your Supabase project (Settings -> API) ----
const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_PUBLIC_KEY';
// ----------------------------------------------------------------------

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentPops = null;
let currentLocation = null;
let pendingRating = {};
let allPops = [];

navigator.geolocation && navigator.geolocation.getCurrentPosition(
  pos => { currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
  () => { currentLocation = null; },
  { enableHighAccuracy: true, timeout: 8000 }
);

async function loadList(searchText) {
  const listView = document.getElementById('listView');
  listView.innerHTML = '<p class="empty">Loading nearby spaces…</p>';
  let query = supabase.from('pops').select('*').order('name');
  const { data, error } = await query;
  if (error) { listView.innerHTML = '<p class="empty">Could not load spaces. Check your Supabase config.</p>'; return; }
  allPops = data || [];
  const filtered = searchText
    ? allPops.filter(p => p.name.toLowerCase().includes(searchText.toLowerCase()))
    : allPops;
  if (filtered.length === 0) {
    listView.innerHTML = '<p class="empty">No spaces yet. Add some in the Supabase table editor.</p>';
    return;
  }
  const rows = await Promise.all(filtered.map(async p => {
    const avg = await getAverages(p.id);
    return { p, avg };
  }));
  listView.innerHTML = rows.map(({ p, avg }) => `
    <button class="card" onclick="window.openProfile('${p.id}')">
      <div class="icon">📍</div>
      <div style="flex:1;min-width:0">
        <p class="name">${p.name}</p>
        <p class="meta">${avg.count ? (avg.quiet < 45 ? 'Quiet' : 'Lively') + ' · ' + (avg.crowd < 45 ? 'Not crowded' : avg.crowd < 70 ? 'Some seats' : 'Crowded') : 'No ratings yet'}</p>
      </div>
      <span class="badge open">Open</span>
    </button>
  `).join('');
}

async function getAverages(popsId) {
  const { data, error } = await supabase.from('ratings').select('quiet,crowd,welcome').eq('pops_id', popsId);
  if (error || !data || data.length === 0) return { quiet: 50, crowd: 50, welcome: 50, count: 0 };
  const n = data.length;
  const sum = data.reduce((a, r) => ({ quiet: a.quiet + r.quiet, crowd: a.crowd + r.crowd, welcome: a.welcome + r.welcome }), { quiet: 0, crowd: 0, welcome: 0 });
  return { quiet: Math.round(sum.quiet / n), crowd: Math.round(sum.crowd / n), welcome: Math.round(sum.welcome / n), count: n };
}

window.onSearch = function () {
  loadList(document.getElementById('searchBox').value);
};

window.openProfile = async function (popsId) {
  const p = allPops.find(x => x.id === popsId);
  currentPops = p;
  pendingRating = {};
  document.getElementById('listView').style.display = 'none';
  const view = document.getElementById('profileView');
  view.style.display = 'block';
  view.innerHTML = '<p class="empty">Loading…</p>';

  const avg = await getAverages(p.id);
  const { data: wishes } = await supabase.from('wishes').select('*').eq('pops_id', p.id).order('votes', { ascending: false });
  const { data: traces } = await supabase.from('traces').select('lat,lng,type').eq('pops_id', p.id).limit(60);

  view.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <button class="backbtn" onclick="window.backToList()" aria-label="Back">←</button>
      <div>
        <p class="h1">${p.name}</p>
        <p class="sub">${p.description || ''}</p>
      </div>
    </div>

    <div class="section">
      <h3>Lived layer, ${avg.count} rating${avg.count === 1 ? '' : 's'}</h3>
      <div class="barlabel"><span>Quiet</span><span>Lively</span></div>
      <div class="bar"><span style="width:${avg.quiet}%"></span></div>
      <div class="barlabel"><span>Open seating</span><span>Crowded</span></div>
      <div class="bar"><span style="width:${avg.crowd}%"></span></div>
      <div class="barlabel"><span>Welcoming</span><span>Feels closed off</span></div>
      <div class="bar"><span style="width:${avg.welcome}%"></span></div>
    </div>

    <div class="section">
      <h3>Traces left here</h3>
      <svg id="traceSvg" viewBox="0 0 300 100" height="100">
        <rect x="4" y="4" width="292" height="92" rx="10" fill="#fff" stroke="#E3DDD0"/>
        ${(traces || []).map(t => {
          const x = 20 + Math.random() * 260;
          const y = 15 + Math.random() * 70;
          return `<circle cx="${x}" cy="${y}" r="4" fill="${t.type === 'wish' ? '#C1502E' : '#0F5257'}"/>`;
        }).join('')}
      </svg>
    </div>

    <div class="section">
      <h3>Rate this visit</h3>
      <p style="font-size:11px;color:var(--muted);margin:0 0 6px">How did it feel</p>
      <div class="chiprow" id="quietChips">
        <button class="chip" onclick="window.pickRate('quiet',15,this)">Quiet</button>
        <button class="chip" onclick="window.pickRate('quiet',50,this)">Balanced</button>
        <button class="chip" onclick="window.pickRate('quiet',85,this)">Lively</button>
      </div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 6px">Seating</p>
      <div class="chiprow" id="crowdChips">
        <button class="chip" onclick="window.pickRate('crowd',15,this)">Wide open</button>
        <button class="chip" onclick="window.pickRate('crowd',50,this)">Some seats</button>
        <button class="chip" onclick="window.pickRate('crowd',85,this)">Crowded</button>
      </div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 6px">Vibe</p>
      <div class="chiprow" id="welcomeChips">
        <button class="chip" onclick="window.pickRate('welcome',85,this)">Welcoming</button>
        <button class="chip" onclick="window.pickRate('welcome',50,this)">Neutral</button>
        <button class="chip" onclick="window.pickRate('welcome',15,this)">Felt closed off</button>
      </div>
      <button class="btn secondary" onclick="window.submitRating()">Submit rating</button>
      <p class="confirm" id="ratingConfirm"></p>
    </div>

    <div class="section">
      <h3>What would make this better</h3>
      <div class="wishwrap" id="wishCloud">
        ${(wishes || []).map(w => `<button class="wishtag" onclick="window.tapWish('${w.tag.replace(/'/g, "\\'")}')">${w.tag} · ${w.votes}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="wishInput" placeholder="Add your own idea" style="flex:1;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px"/>
        <button class="btn secondary" style="width:auto;padding:8px 14px" onclick="window.addWish()">Add</button>
      </div>
      <p class="confirm" id="wishConfirm"></p>
    </div>

    <div class="section">
      <h3>Share your spot</h3>
      <div class="uploadrow">
        <label class="uploadbtn">Add a photo<input type="file" accept="image/*" onchange="window.uploadMedia(this,'photo')"/></label>
        <label class="uploadbtn">Add a recording<input type="file" accept="audio/*" onchange="window.uploadMedia(this,'recording')"/></label>
      </div>
      <p class="confirm" id="mediaConfirm"></p>
    </div>
  `;
};

window.backToList = function () {
  document.getElementById('profileView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  loadList('');
};

window.pickRate = function (key, value, el) {
  pendingRating[key] = value;
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
};

window.submitRating = async function () {
  if (!currentPops) return;
  const row = {
    pops_id: currentPops.id,
    quiet: pendingRating.quiet ?? 50,
    crowd: pendingRating.crowd ?? 50,
    welcome: pendingRating.welcome ?? 50,
    lat: currentLocation ? currentLocation.lat : null,
    lng: currentLocation ? currentLocation.lng : null
  };
  const { error } = await supabase.from('ratings').insert(row);
  if (error) { document.getElementById('ratingConfirm').textContent = 'Could not save. Try again.'; return; }
  await supabase.from('traces').insert({ pops_id: currentPops.id, type: 'rating', lat: row.lat, lng: row.lng });
  document.getElementById('ratingConfirm').textContent = 'Thanks — added to the lived layer';
  window.openProfile(currentPops.id);
};

window.tapWish = async function (tag) {
  const { data } = await supabase.from('wishes').select('*').eq('pops_id', currentPops.id).eq('tag', tag).maybeSingle();
  if (data) {
    await supabase.from('wishes').update({ votes: data.votes + 1 }).eq('id', data.id);
  }
  await supabase.from('traces').insert({ pops_id: currentPops.id, type: 'wish', lat: currentLocation?.lat, lng: currentLocation?.lng });
  document.getElementById('wishConfirm').textContent = `Backed "${tag}"`;
  window.openProfile(currentPops.id);
};

window.addWish = async function () {
  const input = document.getElementById('wishInput');
  const val = input.value.trim();
  if (!val) return;
  const { data: existing } = await supabase.from('wishes').select('*').eq('pops_id', currentPops.id).eq('tag', val).maybeSingle();
  if (existing) {
    await supabase.from('wishes').update({ votes: existing.votes + 1 }).eq('id', existing.id);
  } else {
    await supabase.from('wishes').insert({ pops_id: currentPops.id, tag: val, votes: 1 });
  }
  await supabase.from('traces').insert({ pops_id: currentPops.id, type: 'wish', lat: currentLocation?.lat, lng: currentLocation?.lng });
  document.getElementById('wishConfirm').textContent = 'Added your idea to the list';
  window.openProfile(currentPops.id);
};

window.uploadMedia = async function (inputEl, type) {
  const file = inputEl.files[0];
  if (!file || !currentPops) return;
  const bucket = type === 'photo' ? 'photos' : 'recordings';
  const path = `${currentPops.id}/${Date.now()}-${file.name}`;
  const { error: uploadError } = await supabase.storage.from(bucket).upload(path, file);
  if (uploadError) { document.getElementById('mediaConfirm').textContent = 'Upload failed. Try again.'; return; }
  await supabase.from('media').insert({
    pops_id: currentPops.id, type, storage_path: path,
    lat: currentLocation?.lat, lng: currentLocation?.lng
  });
  document.getElementById('mediaConfirm').textContent = type === 'photo' ? 'Photo added' : 'Recording added';
};

loadList('');
</script>
</body>
</html>
