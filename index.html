<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>POPPIN — what's poppin in your neighborhood?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;700;800&family=Varela+Round&family=Reenie+Beanie&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1FBF6B; --green-tint:#EAF9F0; --green-text:#1A9C58;
    --ink:#1A1A1A; --muted:#8A8A82; --line:#EEE; --panel:#F1F0EC; --bg:#FAFAF8;
    --font-display:'Grandstander',sans-serif; --font-body:'Varela Round',sans-serif; --font-script:'Reenie Beanie',cursive;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-body);background:#fff;color:var(--ink)}
  #app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;background:#fff;position:relative;overflow:hidden}
  .wordmark{font-family:var(--font-display);font-weight:800;color:var(--ink);display:inline-flex;align-items:baseline}
  .istem{display:inline-block;position:relative;background:var(--ink);border-radius:3px}
  @keyframes dotBounce{0%,100%{transform:translateX(-50%) rotate(-45deg) translateY(0) scale(1)}50%{transform:translateX(-50%) rotate(-45deg) translateY(-7px) scale(1.05,0.92)}}
  .pindot{position:absolute;left:50%;border-radius:50% 50% 50% 0;background:var(--green);animation:dotBounce 1.1s ease-in-out infinite}
  /* Welcome-screen-only variant: a full illustrated asset instead of the flat CSS teardrop,
     so no rotate(-45deg) (that was only there to orient the CSS shape) — just a vertical bounce. */
  @keyframes heroDotBounce{0%,100%{transform:translateX(-50%) translateY(0) scale(1)}50%{transform:translateX(-50%) translateY(-7px) scale(1.05,0.92)}}
  .pindot-hero{position:absolute;left:50%;animation:heroDotBounce 1.1s ease-in-out infinite}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
  #onboarding{position:relative;background:var(--bg);height:100%;display:flex;flex-direction:column;overflow-y:auto}
  #onboarding .content{position:relative;flex:1;display:flex;flex-direction:column;padding:50px 28px 28px;text-align:center;animation:fadeUp 0.5s ease-out both}
  #onboarding .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .tagline-script{font-family:var(--font-script);font-size:25px;color:var(--muted);margin:0 0 34px}
  .vibe-line{font-family:var(--font-body);font-size:17px;line-height:1.5;color:#3A3A38;margin:0;max-width:260px;background:rgba(250,249,245,0.85);padding:6px 10px;border-radius:10px}
  .btn-primary{width:100%;background:var(--green);color:#fff;border:none;border-radius:14px;height:52px;font-family:var(--font-display);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
  .reassure{font-family:var(--font-body);text-align:center;font-size:11px;color:#B0AEA6;margin:0}
  #sketchbg{position:absolute;inset:0;width:100%;height:100%}
  #mainApp{position:relative;height:100%}
  #listView{position:absolute;inset:0}
  #mapEl{position:absolute;inset:0;width:100%;height:100%}

  /* Map is genuinely full-screen; the header/search/filter float over it instead of
     pushing it down, per the "Google Maps phone interface" reference in the framework. */
  .map-overlay-top{position:absolute;top:0;left:0;right:0;z-index:500;
    background:linear-gradient(rgba(255,255,255,0.97),rgba(255,255,255,0.85) 70%,transparent);
    padding-top:env(safe-area-inset-top)}
  .header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .searchicon{border:2px solid var(--green);border-radius:8px;background:none;font-size:16px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .searchicon.on{background:var(--green);color:#fff;border-color:var(--green)}
  .searchicon img{width:18px;height:18px;object-fit:contain}
  .searchbar{margin:0 16px 12px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .searchbar input{border:none;background:transparent;font-size:14px;flex:1;outline:none;font-family:var(--font-body)}

  .filter-panel{margin:0 16px 12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
  .filter-panel h4{margin:0 0 8px;font-size:11px;font-family:var(--font-display);color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
  .filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .filter-row:last-child{margin-bottom:0}
  .filter-chip{font-family:var(--font-body);font-size:11px;font-weight:600;padding:6px 12px;border-radius:16px;
    border:1px solid var(--line);background:var(--panel);color:#4A4A44;cursor:pointer}
  .filter-chip.on{border-color:var(--green);background:var(--green-tint);color:var(--green-text)}

  /* Draggable bottom sheet — position is driven by JS setting `top` in px (not transform),
     snapped to one of three fractions of #listView's height on release. */
  #listSheet{position:absolute;left:0;right:0;bottom:0;z-index:450;background:#fff;
    border-radius:20px 20px 0 0;box-shadow:0 -6px 24px rgba(0,0,0,0.14);
    display:flex;flex-direction:column;overflow:hidden}
  .sheet-handle-wrap{padding:10px 0 4px;display:flex;justify-content:center;cursor:grab;touch-action:none;flex-shrink:0}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--line)}
  .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:24px}
  .legend{display:flex;align-items:center;gap:8px;padding:10px 16px 4px}
  .legend .track{flex:1;height:6px;border-radius:3px;background:linear-gradient(90deg,#0EA5A0,#1FBF6B,#7FBF3F,#D9A521,#E8763D)}
  .legend span{font-size:10px;color:var(--muted)}
  .section-title{padding:14px 16px 4px;font-size:16px;font-weight:700;font-family:var(--font-display);color:var(--ink)}
  .list{padding:0 16px}

  /* Leaflet popups re-themed to match the card design instead of Leaflet's stock look */
  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,0.18)}
  .leaflet-popup-content{margin:0;width:220px !important}
  .pin-preview{display:flex;flex-direction:column;cursor:pointer;font-family:var(--font-body)}
  .pin-preview .pin-preview-photo{height:90px;background:#E9E7E1;border-radius:14px 14px 0 0}
  .pin-preview .pin-preview-body{padding:10px 12px}
  .pin-preview .pin-preview-name{font-family:var(--font-display);font-weight:700;font-size:13px;margin:0;color:var(--ink)}
  .pin-preview .pin-preview-meta{font-size:11px;color:var(--muted);margin:3px 0 0}
  .pin-preview.coming-soon .pin-preview-meta{color:var(--muted)}
  .card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--line);width:100%;text-align:left}
  .accentbar{width:6px;height:44px;border-radius:3px;flex-shrink:0}
  .cname{font-weight:700;font-size:14px;margin:0;font-family:var(--font-display);color:var(--ink)}
  .cmeta{font-size:13px;color:var(--muted);margin:4px 0 0;letter-spacing:1px}
  .card-photo{width:48px;height:48px;border-radius:10px;background:#E9E7E1;flex-shrink:0;margin-left:auto}
  .empty{font-size:13px;color:var(--muted);padding:20px 16px;text-align:center}
  .backbtn{background:none;border:none;font-size:20px;cursor:pointer;padding:14px 16px}
  .photo{height:180px;background:#E9E7E1;margin:0;border-radius:0}
  .pname{font-size:22px;font-weight:700;margin:0 0 4px;font-family:var(--font-display);color:var(--ink)}
  .psub{font-size:13px;color:var(--muted);margin:0 0 16px;font-family:var(--font-body)}
  .tag{font-size:12px;font-weight:600;padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:#4A4A44;font-family:var(--font-body)}
  .block{padding:0 20px;margin-bottom:20px}
  .block h3{font-size:12px;font-weight:700;color:#9A9A94;letter-spacing:0.6px;text-transform:uppercase;margin:0 0 12px;font-family:var(--font-display)}
  .bar{height:7px;border-radius:4px;background:#EDECE7;position:relative;overflow:hidden}
  .bar span{position:absolute;left:0;top:0;bottom:0;border-radius:4px;transition:width .4s ease}
  .btn-space{width:100%;color:#fff;border:none;border-radius:14px;height:50px;font-family:var(--font-display);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px}
  /* "Add your read of the space!" only — Submit my read keeps the plain .btn-space look.
     60% height, not full width (centered instead), white/black idle with a visible stroke
     (needed since a white fill would otherwise vanish against the page background) and the
     space's own vibe color (set via a custom property, since the base class's fill is an
     inline style otherwise) only while actively pressed. display:block + margin:auto centers
     it despite being an auto-width button — margin's bottom value is repeated here since the
     shorthand would otherwise reset the 14px spacing .btn-space sets below it. */
  .btn-space-start{display:block;width:auto;height:30px;padding:0 24px;margin:0 auto 14px;
    background:#fff;color:#1A1A1A;border:1.5px solid var(--ink)}
  .btn-space-start:active{background:var(--vibe-color);color:#fff}
  @keyframes pinPulse{0%{transform:scale(0.6);opacity:0.55}100%{transform:scale(2.6);opacity:0}}
  .pulse-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--ring-color, #1FBF6B);animation:pinPulse 1.8s ease-out infinite}
  .you-are-here{width:16px;height:16px;border-radius:50%;background:#1A73E8;border:3px solid #fff;box-shadow:0 0 0 2px rgba(26,115,232,0.35),0 2px 6px rgba(0,0,0,0.3)}

  /* ---------- redesigned profile: two tabs, drag-to-rate ---------- */
  #profileView{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#fff}
  .ptop{position:relative;height:120px;background:#E3DDCC}
  .picon-btn{width:28px;height:28px;border-radius:50%;background:#fff;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .picon-btn img{width:16px;height:16px;object-fit:contain}
  /* Look Inside / Live Activity only — icon 2.5x (16px->40px), button grown just enough to
     contain it with breathing room. The back/save buttons stay plain .picon-btn, unaffected. */
  .picon-btn-lg{width:48px;height:48px;box-shadow:0 2px 3px rgba(0,0,0,0.3)}
  .picon-btn-lg img{width:40px;height:40px}
  .picon-btn-cyan{background:#22D3EE}
  .picon-btn-pink{background:#FF6B9D}
  .pscript-tag{font-family:var(--font-script);font-size:16px;color:#4A4436;margin:0;background:rgba(255,255,255,0.9);padding:3px 9px;border-radius:7px}
  .ptabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .ptab-btn{padding:5px 12px;font-family:var(--font-display);font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--panel);color:#8A8A82}
  .ptab-btn.on{color:#fff;background:#1A1A1A}
  .block-label{font-family:var(--font-display);font-size:10.5px;font-weight:700;color:#9A9A94;
    letter-spacing:0.5px;text-transform:uppercase;margin:14px 0 8px}
  .mini-add-btn{font-family:var(--font-body);font-size:11px;font-weight:600;color:var(--green);
    background:var(--green-tint);border:none;border-radius:14px;padding:5px 10px;cursor:pointer}
  .activity-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .interactions-stat{font-family:var(--font-body);font-size:11px;color:#B0AEA6;margin:-4px 0 10px}
  .activity-chip{font-family:var(--font-body);font-size:12px;font-weight:600;color:#fff;
    padding:8px 12px;border-radius:12px}
  .slider-label{font-size:10px;color:#8A8A82;font-family:var(--font-body);display:flex;justify-content:space-between;margin-bottom:5px}
  .slider-track{height:10px;border-radius:5px;position:relative;background:linear-gradient(90deg,#E8763D,#D9A521,#7FBF3F,#1FBF6B,#0EA5A0);cursor:pointer;touch-action:none}
  .slider-avgdot{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,0.35);transform:translate(-50%,-50%);pointer-events:none}
  .slider-handle{position:absolute;top:50%;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid #1A1A1A;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:grab}
  .hint-text{font-family:var(--font-body);font-size:9.5px;color:#B0AEA6;text-align:center;margin:0 0 10px}
  .space-detail{font-family:var(--font-body);font-size:13px;color:var(--ink);margin:0 0 4px}
  .amenity-pill{font-family:var(--font-body);font-size:11px;color:#5A5A54;display:flex;align-items:center;gap:5px}
  .uploadbtn{flex:1;text-align:center;padding:10px;border:1.5px dashed #D8D4C8;border-radius:10px;font-family:var(--font-body);font-size:11px;color:#8A8A82;cursor:pointer}
  input[type=file]{display:none}

  /* ---------- Happening: drop-a-pin modal + invite card ---------- */
  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:900;display:flex;align-items:flex-end}
  .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;margin:0 auto;max-height:85vh;overflow-y:auto}
  .sheet h2{font-family:var(--font-display);font-size:16px;margin:0 0 14px;color:var(--ink)}
  .posttype-row{display:flex;gap:10px;margin-bottom:16px}
  .posttype-opt{flex:1;border-radius:12px;padding:12px;text-align:center;cursor:pointer;border:2px solid var(--line)}
  .posttype-opt.on{border-color:var(--green);background:var(--green-tint)}
  .icon-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .icon-opt{width:38px;height:38px;border-radius:10px;border:2px solid var(--line);background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .icon-opt.on{border-color:var(--green);background:var(--green-tint)}
  .sheet input[type=text],.sheet textarea,.sheet select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:var(--font-body);font-size:13px;margin-bottom:12px}

  /* ---------- live activity banner, top of What's Happening when one is open ---------- */
  .live-banner{background:var(--green-tint);border:1px solid var(--green);border-radius:14px;
    padding:12px;margin-bottom:16px;overflow:hidden}
  .live-banner-photo{height:100px;background-size:cover;background-position:center;
    border-radius:10px;margin:-12px -12px 10px}
  .live-banner-title{font-family:var(--font-display);font-weight:700;font-size:14px;margin:0;color:var(--ink)}
  .live-banner-time{margin-left:auto;font-family:var(--font-body);font-size:10px;color:var(--green-text);white-space:nowrap}
  .live-banner-msg{font-family:var(--font-script);font-size:16px;color:#4A4436;margin:0 0 10px}
  .live-banner-count{font-family:var(--font-body);font-size:11px;color:var(--green-text)}

  /* ---------- media gallery, The Space tab ---------- */
  .media-gallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
  .media-thumb{flex-shrink:0;width:84px;height:84px;border-radius:10px;background:#E9E7E1;
    background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:22px}
</style>
</head>
<body>
<div id="app">

  <div id="onboarding">
    <svg id="sketchbg" viewBox="0 0 360 600" stroke="#DCD6C4" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g transform="translate(42,50)">
        <circle cx="0" cy="0" r="16"/>
        <line x1="0" y1="-26" x2="0" y2="-21"/><line x1="0" y1="21" x2="0" y2="26"/>
        <line x1="-26" y1="0" x2="-21" y2="0"/><line x1="21" y1="0" x2="26" y2="0"/>
        <line x1="-18" y1="-18" x2="-15" y2="-15"/><line x1="18" y1="-18" x2="15" y2="-15"/>
        <line x1="-18" y1="18" x2="-15" y2="15"/><line x1="18" y1="18" x2="15" y2="15"/>
        <circle cx="-5" cy="-2" r="1.4" fill="#DCD6C4"/><circle cx="5" cy="-2" r="1.4" fill="#DCD6C4"/>
        <path d="M-6,5 C-3,9 3,9 6,5"/>
      </g>
      <g transform="translate(320,90)"><ellipse cx="0" cy="-4" rx="18" ry="16"/><line x1="0" y1="10" x2="0" y2="30"/></g>
      <g transform="translate(46,490)">
        <ellipse cx="0" cy="34" rx="34" ry="9"/><path d="M-30,34 C-30,20 30,20 30,34"/>
        <ellipse cx="0" cy="10" rx="16" ry="5"/><path d="M-12,10 C-12,2 12,2 12,10"/>
        <line x1="0" y1="-4" x2="0" y2="2"/>
        <path d="M0,-4 C-6,-14 -14,-16 -18,-10" stroke-dasharray="1 5"/>
        <path d="M0,-4 C6,-14 14,-16 18,-10" stroke-dasharray="1 5"/>
      </g>
      <g transform="translate(285,515)">
        <line x1="-24" y1="14" x2="24" y2="14"/><line x1="-20" y1="14" x2="-20" y2="26"/><line x1="20" y1="14" x2="20" y2="26"/>
        <line x1="-24" y1="-2" x2="24" y2="-2"/>
        <circle cx="-4" cy="-16" r="7"/><path d="M-6,-15 C-5,-13 -3,-13 -2,-15" stroke-width="1.2"/>
        <path d="M-11,0 C-11,-8 3,-8 3,0"/><rect x="-2" y="-4" width="10" height="7" rx="1"/>
      </g>
      <g transform="translate(60,300)">
        <circle cx="0" cy="-20" r="7"/><path d="M-6,0 C-6,-10 6,-10 6,0 L4,18 M-4,0 L-6,18"/>
        <path d="M6,-6 C16,-2 20,6 26,10"/>
        <path d="M30,14 C34,9 40,9 42,14 C44,18 40,22 36,20 C33,19 30,17 30,14 Z"/>
        <line x1="36" y1="20" x2="40" y2="26"/>
        <path d="M30,13 C28,9 26,10 25,13" stroke-width="1.2"/><path d="M30,13 C32,9 34,10 35,13" stroke-width="1.2"/>
      </g>
    </svg>

    <div class="content">
      <div class="center">
        <span class="wordmark" style="font-size:36px;margin-bottom:6px">POPP<span class="istem" style="width:7px;height:26px;margin:0 2px"><img class="pindot-hero" src="Assets/Vectors/138418471_284552b1-14f5-411f-b8c1-38f5f1a73f7d.svg" style="width:24px;top:-30px" alt=""/></span>N</span>
        <p class="tagline-script">what's poppin in your neighborhood?</p>
        <p class="vibe-line">Find your perfect spot to read, work, hang, or just <span style="color:var(--green);font-weight:700">vibe</span>, right now.</p>
      </div>
      <div>
        <button class="btn-primary" onclick="window.enterApp()">Let's go</button>
        <p class="reassure">No account needed to look around</p>
      </div>
    </div>
  </div>

  <div id="mainApp" style="display:none">

    <div id="listView">
      <div id="mapEl"></div>

      <div class="map-overlay-top">
        <div class="header">
          <span class="wordmark" style="font-size:19px"><span>POPP</span><span class="istem" style="width:4px;height:14px;margin:0 1px"><span class="pindot" style="width:9px;height:9px;top:-11px"></span></span><span>N</span></span>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="searchicon" id="filterIcon" onclick="window.toggleFilters()" aria-label="Filter"><img src="Assets/Vectors/filter.png" alt=""/></button>
            <button class="searchicon" onclick="window.toggleSearch()" aria-label="Search"><img src="Assets/Vectors/search.png" alt=""/></button>
          </div>
        </div>
        <div id="searchbar" class="searchbar" style="display:none">
          <input id="searchBox" placeholder="What's poppin near me?" oninput="onSearch()"/>
        </div>
        <div id="filterPanel" class="filter-panel" style="display:none">
          <h4>Distance</h4>
          <div class="filter-row" id="filterDistance"></div>
          <h4>Liveliness</h4>
          <div class="filter-row" id="filterLiveliness"></div>
          <h4>Activities</h4>
          <div class="filter-row" id="filterActivities"></div>
          <h4>Sort</h4>
          <div class="filter-row" id="filterSort"></div>
        </div>
      </div>

      <div id="listSheet">
        <div class="sheet-handle-wrap" id="sheetHandle"><div class="sheet-handle"></div></div>
        <div class="sheet-body">
          <div class="legend"><span>Quiet</span><div class="track"></div><span>Lively</span></div>
          <div class="section-title" id="sectionTitle">POPS I can walk to</div>
          <div id="listCards" class="list"></div>
        </div>
      </div>
    </div>

    <div id="profileView" style="display:none"></div>
  </div>

  <div id="dropPinModal" style="display:none"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
let createClient = null;
try {
  const mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  createClient = mod.createClient;
} catch (e) {
  console.warn('POPPIN: Could not load Supabase library. The app will still open, just without a live backend.', e);

const VIBE_STOPS = [
  { at: 0,   color: [14, 165, 160] },
  { at: 25,  color: [31, 191, 107] },
  { at: 50,  color: [127, 191, 63] },
  { at: 75,  color: [217, 165, 33] },
  { at: 100, color: [232, 118, 61] }
];
function vibeColor(liveliness) {
  const v = Math.max(0, Math.min(100, liveliness));
  for (let i = 0; i < VIBE_STOPS.length - 1; i++) {
    const a = VIBE_STOPS[i], b = VIBE_STOPS[i + 1];
    if (v >= a.at && v <= b.at) {
      const t = (v - a.at) / (b.at - a.at);
      const rgb = a.color.map((c, idx) => Math.round(c + (b.color[idx] - c) * t));
      return 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
    }
  }
  return 'rgb(' + VIBE_STOPS[VIBE_STOPS.length - 1].color.join(',') + ')';
}

// Batched (one query for every POPS at once) rather than one query per POPS — with all
// ~392 real spaces now rendering as individual pins (see loadList), N+1 queries per pin
// would mean hundreds of sequential round trips just to draw the map.
async function getActivityTagsByPops(popsIds) {
  const result = {};
  popsIds.forEach(id => { result[id] = []; });
  if (!supabase || !popsIds.length) return result;
  const { data } = await supabase.from('wishes').select('pops_id,tag,votes').in('pops_id', popsIds).eq('kind', 'activity');
  (data || []).forEach(r => { result[r.pops_id].push(r); });

}

async function getRecentlyActiveSet(popsIds) {
  if (!supabase || !popsIds.length) return new Set();
  const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
  const { data } = await supabase.from('traces').select('pops_id').in('pops_id', popsIds).gt('created_at', oneHourAgo);
  return new Set((data || []).map(r => r.pops_id));
}

async function getRatingsByPops(popsIds) {
  const result = {};
  popsIds.forEach(id => { result[id] = { safety: 50, crowd: 50, welcome: 50, count: 0 }; });
  if (!supabase || !popsIds.length) return result;
  const { data } = await supabase.from('ratings').select('pops_id,safety,crowd,welcome').in('pops_id', popsIds);
  const grouped = {};
  (data || []).forEach(r => { (grouped[r.pops_id] = grouped[r.pops_id] || []).push(r); });
  Object.keys(grouped).forEach(id => {
    const rows = grouped[id];
    const n = rows.length;
    const sum = rows.reduce((a, r) => ({ safety: a.safety + r.safety, crowd: a.crowd + r.crowd, welcome: a.welcome + r.welcome }), { safety: 0, crowd: 0, welcome: 0 });
    result[id] = { safety: Math.round(sum.safety / n), crowd: Math.round(sum.crowd / n), welcome: Math.round(sum.welcome / n), count: n };
  });
  return result;
}

// ---------------- draggable bottom sheet ----------------
// Position is driven by setting `top` in px on #listSheet, snapped on release to one of
// three fractions of #listView's height — simplest way to get Google-Maps-style pull-up
// behavior without pulling in a whole gesture library for it.
const SHEET_SNAPS = { peek: 0.82, half: 0.55, full: 0.1 };
let currentSheetSnap = 'half';

function applySheetSnap(snap, animate) {
  const container = document.getElementById('listView');
  const sheet = document.getElementById('listSheet');
  if (!container || !sheet) return;
  const h = container.clientHeight;
  sheet.style.transition = animate === false ? 'none' : 'top .25s ease';
  sheet.style.top = Math.round(h * SHEET_SNAPS[snap]) + 'px';
  currentSheetSnap = snap;
}

(function initSheetDrag() {
  const handle = document.getElementById('sheetHandle');
  const sheet = document.getElementById('listSheet');
  const container = document.getElementById('listView');
  let dragging = false, startY = 0, startTop = 0;

  handle.addEventListener('pointerdown', e => {
    dragging = true;
    startY = e.clientY;
    startTop = sheet.getBoundingClientRect().top - container.getBoundingClientRect().top;
    sheet.style.transition = 'none';
    handle.setPointerCapture(e.pointerId);
  });
  handle.addEventListener('pointermove', e => {
    if (!dragging) return;
    const h = container.clientHeight;
    const minTop = h * SHEET_SNAPS.full;
    const maxTop = h * SHEET_SNAPS.peek;
    const top = Math.max(minTop, Math.min(maxTop, startTop + (e.clientY - startY)));
    sheet.style.top = top + 'px';
  });
  handle.addEventListener('pointerup', () => {
    if (!dragging) return;
    dragging = false;
    const h = container.clientHeight;
    const currentFrac = (sheet.getBoundingClientRect().top - container.getBoundingClientRect().top) / h;
    let nearest = 'half', nearestDist = Infinity;
    Object.keys(SHEET_SNAPS).forEach(name => {
      const d = Math.abs(SHEET_SNAPS[name] - currentFrac);
      if (d < nearestDist) { nearestDist = d; nearest = name; }
    });
    applySheetSnap(nearest);
  });
  handle.addEventListener('pointercancel', () => { dragging = false; });
})();

window.addEventListener('resize', () => {
  applySheetSnap(currentSheetSnap, false);
  if (leafletMap) leafletMap.invalidateSize();
});

async function getAverages(popsId) {

  if (!data || data.length === 0) return { safety: 50, crowd: 50, welcome: 50, count: 0 };
  const n = data.length;
  const sum = data.reduce((a, r) => ({ safety: a.safety + r.safety, crowd: a.crowd + r.crowd, welcome: a.welcome + r.welcome }), { safety: 0, crowd: 0, welcome: 0 });
  return { safety: Math.round(sum.safety / n), crowd: Math.round(sum.crowd / n), welcome: Math.round(sum.welcome / n), count: n };
}

// Liveliness (0-100, what colors every pin) is a weighted composite of three signals, per
// FRAMEWORKS/POPPIN_App_Framework.md:75 — "a composite of the crowdedness of the space (the
// idea is through noise sensors this is approximated) and the amount of activity and
// engagement logged in a space through this platform." The three inputs:
//   1. crowd    — the "Open Seating -> Couldn't Find a Spot" rating average (real user data)
//   2. noise    — a noise-sensor reading 0-100. No sensor hardware in this pilot, so it comes
//                 from simulated data (pops.noise) and is null until that data is generated.
//   3. activity — how much activity has been logged here on the app, saturating to 100.
// Any signal that's absent (a space with no ratings, or no noise value yet) drops out and its
// weight is redistributed across the signals we do have, so the number stays honest as data
// fills in — before the simulated noise data lands, this is simply crowd + activity.
const LIVELINESS_WEIGHTS = { crowd: 0.4, noise: 0.35, activity: 0.25 };
const ACTIVITY_SATURATION_VOTES = 20; // this many logged activity-votes reads as fully lively

function activityLivelinessScore(activityRows) {
  const votes = (activityRows || []).reduce((s, r) => s + (r.votes || 0), 0);
  if (votes <= 0) return null; // nothing logged is absence of a signal, not "zero lively"
  return Math.min(100, (votes / ACTIVITY_SATURATION_VOTES) * 100);
}

function computeLiveliness(pop, avg, activityRows) {
  const parts = []; // [weight, value] for each signal we actually have data for
  if (avg && avg.count > 0) parts.push([LIVELINESS_WEIGHTS.crowd, avg.crowd]);
  if (pop && pop.noise != null) parts.push([LIVELINESS_WEIGHTS.noise, pop.noise]);
  const act = activityLivelinessScore(activityRows);
  if (act != null) parts.push([LIVELINESS_WEIGHTS.activity, act]);
  if (!parts.length) return 50; // no signal at all -> neutral middle of the scale
  const wsum = parts.reduce((s, [w]) => s + w, 0);
  return parts.reduce((s, [w, v]) => s + (w / wsum) * v, 0);
}

// Real straight-line distance in meters (Haversine), then a rough walking-minutes
// estimate at an average pace. This is what makes the "10-minute vibe check" header
// an honest claim rather than a decorative one, it only shows when it's actually true.
const WALK_METERS_PER_MINUTE = 80; // ~4.8 km/h average walking pace
function distanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function walkMinutesTo(pop) {
  if (!currentLocation || pop.lat == null || pop.lng == null) return null;
  const meters = distanceMeters(currentLocation.lat, currentLocation.lng, pop.lat, pop.lng);
  return meters / WALK_METERS_PER_MINUTE;
}

// iOS Safari silently ignores getCurrentPosition() calls that aren't triggered by a direct
// user gesture — it never even shows the permission prompt. So this can't just run at module
// load; it has to be called from inside a real click handler (window.enterApp, tied to the
// "Let's go" button tap). Once permission is granted, later calls (e.g. on a returning visit,
// where enterApp() fires automatically) work fine without a fresh gesture.
function requestLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      renderUserLocationMarker();
      // enterApp's own loadList('') call almost always runs before this resolves — geolocation
      // is async and typically slower than the initial render — so the "5 closest" cap never
      // saw a location the first time. Re-run once it's actually available, but only if the
      // app is already showing (no point re-fetching while still on the onboarding screen).
      if (document.getElementById('mainApp').style.display !== 'none') {
        loadList(document.getElementById('searchBox').value);
      }
    },
    err => {
      currentLocation = null;
      console.warn('Location unavailable:', err.message);
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

window.enterApp = function () {
  // Ask for location FIRST, before any DOM/map work, while the tap gesture is freshest.
  // iOS Safari ties getCurrentPosition() to a live user gesture and is stricter than
  // Chromium — heavy synchronous work (initMap etc.) before the call can consume the
  // gesture, so the permission prompt silently never appears. (On the ?openProfile deep-link
  // path below, there's no fresh gesture to tie to — but that's fine: this only matters for
  // the very first-ever prompt, and by the time someone reaches Look Inside and comes back,
  // permission has already been granted or denied once through the real "Let's go" tap.)
  requestLocation();
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  renderFilterChips();
  applySheetSnap('half', false);
  initMap();
  renderUserLocationMarker();
  // Load active meetups first so the initial marker render already knows which POPS
  // pins should pulse — otherwise pulsing would only appear after some later reload. Returned
  // so the ?openProfile deep-link (at the very end of this module) can chain onto it —
  // allPops must be loaded before openProfile runs.
  return loadMeetups().then(() => loadList(''));
};

function initMap() {

  leafletMap = L.map('mapEl', { zoomControl: false }).setView([40.74, -73.96], 12);
  // CartoDB Positron: free, keyless, light basemap — matches the framework's map spec

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO', maxZoom: 19, subdomains: 'abcd'
  }).addTo(leafletMap);
  // One flat marker layer, no clustering — every POPS renders individually at its real
  // location, simulated as fully active (no gray/inactive tier). Density is instead
  // managed by thinMarkersForView, re-run whenever the view settles.
  markerLayer = L.layerGroup().addTo(leafletMap);

    renderMapMarkers(thinMarkersForView(lastMapList), lastActivityTagsByPops, lastRecentlyActiveSet);

  // opening the profile directly; tapping the open map background drops the "always show
  // this pin regardless of thinning" override so normal density thinning resumes. Marker
  // clicks don't bubble to this — only genuine taps on empty map area do. (Deliberately
  // not using the map's 'popupclose' event for this: renderMapMarkers's own clearLayers()
  // fires popupclose on itself whenever it re-renders while this popup happens to be open,
  // which nulled the flag before the same render finished re-opening the popup — the popup
  // would flash and immediately vanish.)
  leafletMap.on('click', () => { focusPopId = null; });
}

// Fixed for now — pins previously sized by rating count and carried a small activity emoji;
// both are on hold pending a design pass, so every pin renders as a plain same-size dot.
const PIN_SIZE = 30;
function activePinIcon(color, isPulsing, ringColor) {
  const size = PIN_SIZE;
  const pulse = isPulsing ? '<div class="pulse-ring" style="--ring-color:' + (ringColor || color) + '"></div>' : '';
  return L.divIcon({

      '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.25)"></div></div>',
    className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2]
  });

// State kept so the zoomend/moveend listener (in initMap) can re-thin and re-render
// without re-querying Supabase — only loadList's own calls trigger real data fetches.
let lastMapList = [];
let lastActivityTagsByPops = {};
let lastRecentlyActiveSet = new Set();
let markerById = {};
// Set by window.focusPopOnMap (a list-card tap) — forces that one POPS's pin to survive
// thinning and auto-opens its preview, until the preview is dismissed (popupclose, initMap).
let focusPopId = null;
// popsId -> its most recent still-open meetup row, refreshed by loadMeetups(). A live
// activity doesn't get its own map pin — it makes the POPS's own pin pulse green instead.
let activeMeetupsByPops = {};

// Not clustering with count bubbles — the user found that overwhelming with ~392 pins.
// Instead: a light grid-based thinning that keeps at most one pin per screen-pixel cell.
// Re-run on every zoomend/moveend, so cells cover less real ground as you zoom in and
// previously-hidden pins that shared a cell with a visible one split apart and reveal.
function thinMarkersForView(list) {
  if (!leafletMap) return list;
  const zoom = leafletMap.getZoom();
  const bounds = leafletMap.getBounds().pad(0.3);
  const cellPx = 56;
  const seen = new Set();
  const kept = [];
  list.slice()
    .sort((a, b) => (b._count || 0) - (a._count || 0)) // more-rated spots win a shared cell
    .forEach(p => {
      if (p.lat == null || p.lng == null || !bounds.contains([p.lat, p.lng])) return;
      const pt = leafletMap.project([p.lat, p.lng], zoom);
      const key = Math.round(pt.x / cellPx) + ':' + Math.round(pt.y / cellPx);
      if (seen.has(key)) return;
      seen.add(key);
      kept.push(p);
    });
  if (focusPopId && !kept.some(p => p.id === focusPopId)) {
    const focused = list.find(p => p.id === focusPopId);
    if (focused) kept.push(focused);
  }
  return kept;
}

// No async work per pin here — everything needed (ratings, activity tags, recent-activity)
// was already batch-fetched once in loadList. Tapping a pin (or a list card, via
// window.focusPopOnMap) opens the same small preview card — tapping the card itself is
// what goes to the profile, not the pin/card tap directly.
function renderMapMarkers(list, activityTagsByPops, recentlyActiveSet) {
  if (!markerLayer) return;
  markerLayer.clearLayers();
  markerById = {};

  list.forEach(p => {
    if (p.lat == null || p.lng == null) return;
    const tags = (activityTagsByPops[p.id] || []).slice().sort((a, b) => b.votes - a.votes);
    const hasLiveActivity = !!activeMeetupsByPops[p.id];
    // A live activity always pulses green, taking priority over the generic
    // recently-active indicator (which uses the pin's own liveliness color).
    const isPulsing = hasLiveActivity || recentlyActiveSet.has(p.id);
    const ringColor = hasLiveActivity ? '#1FBF6B' : p._color;
    const icon = activePinIcon(p._color, isPulsing, ringColor);
    const marker = L.marker([p.lat, p.lng], { icon }).addTo(markerLayer);
    markerById[p.id] = marker;
    // Same icon language as the list card — amenities + recent activities, not a
    // liveliness word and crowd word (that's what the accent bar / pin color already say).
    const icons = amenityIconsFor(p).concat(activityIconsFor(tags));
    const metaHtml = icons.length
      ? icons.map(i => '<span>' + i + '</span>').join(' ')
      : '<span style="color:#B0AEA6">Nothing logged yet</span>';
    marker.bindPopup(
      '<div class="pin-preview" onclick="window.openProfile(\'' + p.id + '\')">' +
        '<div class="pin-preview-photo"></div>' +
        '<div class="pin-preview-body">' +
          '<p class="pin-preview-name">' + p.name + '</p>' +
          '<p class="pin-preview-meta">' + metaHtml + '</p>' +
        '</div></div>',
      { closeButton: false, className: 'pin-popup', maxWidth: 220 }
    );
  });

  if (focusPopId && markerById[focusPopId]) {
    markerById[focusPopId].openPopup();
  }
}

// List-card tap: behaves like tapping the pin itself (zoom + preview card), not a direct
// profile jump. Collapses the sheet to "peek" so the map + preview are actually visible.
window.focusPopOnMap = function (id) {
  const p = lastMapList.find(x => x.id === id);
  if (!p || p.lat == null || p.lng == null || !leafletMap) return;
  focusPopId = id;
  applySheetSnap('peek');
  leafletMap.setView([p.lat, p.lng], Math.max(leafletMap.getZoom(), 16), { animate: true });
  // setView may not fire zoomend/moveend if we're already centered there — render once
  // immediately as a fallback so the preview still opens in that case.
  renderMapMarkers(thinMarkersForView(lastMapList), lastActivityTagsByPops, lastRecentlyActiveSet);
};

// Called from real data loads (loadList): stores the full matching set, thins it for
// the current view, and repositions the map — unlike the zoomend/moveend listener, which
// only re-thins on pan/zoom and never moves the camera itself.
//
// With a real search/filter/sort narrowing the results, fit to the full set of matches (not
// just the thinned ones, or fitBounds would shrink every time thinning ran and fight the
// user's own zoom/pan). With no search/filter active — the default browse view — center on
// the user instead: fitting to all ~395 POPS citywide on every plain load was the actual bug
// being fixed here, since it buries "where am I" under "here's all of NYC."
function updateMapMarkers(fullList, activityTagsByPops, recentlyActiveSet, hasSearchOrFilters) {
  lastMapList = fullList;
  lastActivityTagsByPops = activityTagsByPops;
  lastRecentlyActiveSet = recentlyActiveSet;
  renderMapMarkers(thinMarkersForView(fullList), activityTagsByPops, recentlyActiveSet);
  if (!leafletMap) return;
  if (hasSearchOrFilters) {
    const points = fullList.filter(p => p.lat != null && p.lng != null).map(p => [p.lat, p.lng]);
    if (points.length) leafletMap.fitBounds(points, { padding: [20, 20] });
  } else if (currentLocation) {
    leafletMap.setView([currentLocation.lat, currentLocation.lng], 15, { animate: false });
  }
  // else: no search/filter and no location yet — leave the map at initMap's fixed default
  // view; requestLocation()'s success callback re-runs loadList once a fix comes in, which
  // re-enters this same branch and centers on the user then.
}

async function loadList(searchText) {
  const wrap = document.getElementById('listCards');
  if (!supabase) {
    wrap.innerHTML = '<p class="empty">POPPIN isn\'t connected to a database yet. Add your Supabase project URL and anon key at the top of the script to see real spaces here.</p>';
    return;
  }
  wrap.innerHTML = '<p class="empty">Loading nearby spaces...</p>';
  const { data, error } = await supabase.from('pops').select('*').order('name');
  if (error) { wrap.innerHTML = '<p class="empty">Could not load spaces. Check your Supabase config.</p>'; return; }
  allPops = data || [];
  focusPopId = null; // fresh data load — any prior list-tap focus no longer applies

  // Prototype simulates every real POPS as active: no gray/inactive tier, no clustering,
  // every pin renders individually at its real location and is fully interactive.
  const ids = allPops.map(p => p.id);
  const [ratingsByPops, activityTagsByPops, recentlyActiveSet] = await Promise.all([
    getRatingsByPops(ids),
    getActivityTagsByPops(ids),
    getRecentlyActiveSet(ids)
  ]);
  const rows = allPops.map(p => ({ p, avg: ratingsByPops[p.id] }));

  // Search matches POPS name or its street address; filters (distance/liveliness/activities)
  // stack on top. With zero activity tags logged anywhere yet, any activities filter
  // correctly leaves zero results — matchesActivityFilter returns false for an empty tag list.
  const search = (searchText || '').toLowerCase().trim();
  const filtered = rows.filter(r => {
    if (search) {
      const nameMatch = r.p.name.toLowerCase().includes(search);
      const addrMatch = (r.p.building_address || '').toLowerCase().includes(search);
      if (!nameMatch && !addrMatch) return false;
    }
    if (activeFilters.distance) {
      const mins = walkMinutesTo(r.p);
      if (mins === null || mins > activeFilters.distance) return false;
    }
    if (activeFilters.liveliness) {
      const liveliness = computeLiveliness(r.p, r.avg, activityTagsByPops[r.p.id]);
      const band = liveliness < 35 ? 'quiet' : liveliness < 65 ? 'balanced' : 'lively';
      if (band !== activeFilters.liveliness) return false;
    }
    if (activeFilters.activities.size > 0 && !matchesActivityFilter(activityTagsByPops[r.p.id] || [])) {
      return false;
    }
    return true;
  });

  // The list itself is capped to the 5 closest by default, so it's not just as
  // overwhelming a wall as the unthinned map would be — but that cap only applies when
  // browsing with no search/filters/sort active; a real search, filter, or sort should show
  // every match. Sort-by-popular composes with whatever other filters are active (it's just
  // an ordering, not a narrowing), so it's applied after the default-cap branch, not inside it.
  // Computed before updateMapMarkers below too — same "are we actually narrowing results"
  // question decides whether the map fits to the matches or centers on the user instead.
  const hasSearchOrFilters = !!search || !!activeFilters.distance || !!activeFilters.liveliness || activeFilters.activities.size > 0 || !!activeFilters.sort;

  // Map shows every match (thinned for on-screen density, see thinMarkersForView) —
  // search/filters narrow the candidate set for both the map and the list together.
  updateMapMarkers(
    filtered.map(r => Object.assign({}, r.p, { _color: vibeColor(computeLiveliness(r.p, r.avg, activityTagsByPops[r.p.id])), _count: r.avg.count, _avg: r.avg })),
    activityTagsByPops,
    recentlyActiveSet,
    hasSearchOrFilters
  );

  let listRows = filtered;
  if (!hasSearchOrFilters && currentLocation) {
    listRows = filtered.slice()
      .sort((a, b) => walkMinutesTo(a.p) - walkMinutesTo(b.p))
      .slice(0, 5);
  } else if (activeFilters.sort === 'popular') {
    listRows = filtered.slice().sort((a, b) => (b.p.interactions || 0) - (a.p.interactions || 0));
  }

  const titleEl = document.getElementById('sectionTitle');
  if (activeFilters.sort === 'popular' && !search && !activeFilters.distance && !activeFilters.liveliness && activeFilters.activities.size === 0) {
    titleEl.textContent = 'Most popular spots';
  } else if (hasSearchOrFilters) {
    titleEl.textContent = listRows.length + (listRows.length === 1 ? ' spot matches' : ' spots match');
  } else if (currentLocation && listRows.length > 0 && listRows.every(r => { const m = walkMinutesTo(r.p); return m !== null && m <= 10; })) {
    titleEl.textContent = listRows.length + (listRows.length === 1 ? ' spot' : ' spots') + ' within a 10-minute vibe check';
  } else if (currentLocation) {
    titleEl.textContent = 'Closest spots to you';
  } else {
    titleEl.textContent = 'POPS I can walk to';
  }

  if (listRows.length === 0) {
    wrap.innerHTML = '<p class="empty">No spaces match your search and filters. Try clearing some.</p>';
    return;
  }
  // Liveliness shows only as the accent bar's color now — no "Balanced"-style word, no
  // percentage badge. What replaces that text line: amenity + recent-activity emoji icons,
  // per the framework's icon language, with a square photo placeholder on the right.
  wrap.innerHTML = listRows.map(({ p, avg }) => {
    const color = vibeColor(computeLiveliness(p, avg, activityTagsByPops[p.id]));
    const actTags = (activityTagsByPops[p.id] || []).slice().sort((a, b) => b.votes - a.votes);
    const icons = amenityIconsFor(p).concat(activityIconsFor(actTags));
    const metaHtml = icons.length
      ? icons.map(i => '<span>' + i + '</span>').join(' ')
      : '<span style="color:#B0AEA6">Nothing logged yet</span>';
    const interactionsHtml = p.interactions
      ? ' <span style="color:#B0AEA6">&middot; ' + p.interactions + '</span>'
      : '';
    return '<button class="card" onclick="window.focusPopOnMap(\'' + p.id + '\')">' +
      '<div class="accentbar" style="background:' + color + '"></div>' +
      '<div style="flex:1;min-width:0"><p class="cname">' + p.name + '</p>' +
      '<p class="cmeta">' + metaHtml + interactionsHtml + '</p></div>' +
      '<div class="card-photo"></div>' +
      '</button>';
  }).join('');
}

window.postMeetup = async function (popsId) {
  if (!supabase) { alert('Connect Supabase first to post a live activity.'); return; }
  const activity = document.getElementById('activityName').value.trim();
  const message = document.getElementById('activityMsg').value.trim();
  let durationMin = parseInt(document.getElementById('activityDuration').value, 10);
  if (!activity) { alert('Give it a name first.'); return; }
  if (selectedPostType === 'photo' && durationMin > 30) durationMin = 30; // photo posts never outlive their "right now" claim

  const expiresAt = new Date(Date.now() + durationMin * 60 * 1000).toISOString();
  const row = {
    pops_id: popsId, activity, message,
    post_type: selectedPostType,
    icon: selectedPostType === 'icon' ? selectedIcon : null,
    lat: currentLocation ? currentLocation.lat : null,
    lng: currentLocation ? currentLocation.lng : null,
    expires_at: expiresAt
  };

  if (selectedPostType === 'photo' && selectedPhotoFile) {
    const path = popsId + '/' + Date.now() + '-' + selectedPhotoFile.name;
    const { error: upErr } = await supabase.storage.from('meetup-photos').upload(path, selectedPhotoFile);
    if (upErr) { alert('Photo upload failed, try again.'); return; }
    row.photo_path = path;
  }

  const { error } = await supabase.from('meetups').insert(row);
  if (error) { console.error(error); alert('Could not post. Try again.'); return; }
  window.closeDropPin();
  await loadMeetups();
  // Refresh the map so this POPS's own pin starts pulsing, and the profile banner if
  // we're looking at the same space right now (Live Activity is opened from the profile).
  renderMapMarkers(thinMarkersForView(lastMapList), lastActivityTagsByPops, lastRecentlyActiveSet);
  if (currentPops && currentPops.id === popsId) renderLiveActivityBanner(currentPops);
};

// A live activity does not get its own map pin — it makes the POPS's own pin pulse green
// (see renderMapMarkers) and shows as a banner at the top of that POPS's "What's Happening"
// tab (see renderLiveActivityBanner), reached from the profile rather than a separate tap
// target on the map.
async function loadMeetups() {
  activeMeetupsByPops = {};
  if (!supabase) return activeMeetupsByPops;
  const nowIso = new Date().toISOString();
  const { data } = await supabase.from('meetups').select('*').gt('expires_at', nowIso).order('created_at', { ascending: false });
  (data || []).forEach(m => {
    if (!activeMeetupsByPops[m.pops_id]) activeMeetupsByPops[m.pops_id] = m; // most recent per POPS
  });
  return activeMeetupsByPops;
}

      '<button class="btn-space btn-space-start" style="--vibe-color:' + color + '" onclick="window.startRatingSubmission()">Add your read of the space!</button>' +
    '</div>' +
    '<div id="ratingSubmitForm" style="display:none">' +
      '<p class="block-label" style="margin-top:0">What would make this better?</p>' +
      '<textarea id="betterInput" rows="2" placeholder="Optional" style="width:100%;box-sizing:border-box;border:1px solid var(--line);' +
        'border-radius:10px;padding:10px;font-family:var(--font-body);font-size:13px;margin-bottom:12px"></textarea>' +
      '<button class="btn-space" style="background:' + color + '" onclick="window.submitVibeRating()">Submit my read</button>' +
    '</div>';

  renderActivityGrid();
  renderLiveActivityBanner(p);
}

function renderActivityGrid() {
  const grid = document.getElementById('activityGrid');
  if (!grid) return;
  grid.innerHTML = profileActivities.length
    ? profileActivities.map(a => {
        const cat = categoryFor(a);
        return '<span class="activity-chip" style="background:' + (cat ? cat.color : '#8A8A82') + '">' +
          (cat ? cat.emoji + ' ' : '') + a.tag + '</span>';
      }).join('')
    : '<span style="font-family:var(--font-body);font-size:12px;color:#B0AEA6">Nobody\'s said what they\'re up to yet — be the first</span>';
}

window.toggleActivityForm = function () {
  const form = document.getElementById('activityForm');
  const show = form.style.display === 'none';
  form.style.display = show ? 'block' : 'none';
  if (show) {
    selectedActivityCategory = null;
    document.getElementById('activityTagInput').value = '';
    document.getElementById('activityCategoryPicker').innerHTML = ACTIVITY_CATEGORIES.map(c =>
      '<button type="button" class="filter-chip" data-id="' + c.id + '" onclick="window.pickActivityCategory(\'' + c.id + '\')">' + c.emoji + ' ' + c.label + '</button>'
    ).join('');
  }
};

window.pickActivityCategory = function (id) {
  selectedActivityCategory = id;
  document.querySelectorAll('#activityCategoryPicker .filter-chip').forEach(b => b.classList.toggle('on', b.dataset.id === id));
};

window.submitActivity = async function () {
  if (!supabase || !currentPops) return;
  const tag = document.getElementById('activityTagInput').value.trim();
  if (!tag) { alert('Say what you\'re up to first.'); return; }
  if (!selectedActivityCategory) { alert('Pick a category first.'); return; }
  const { data: existing, error: selectError } = await supabase.from('wishes').select('*').eq('pops_id', currentPops.id).eq('tag', tag).eq('kind', 'activity').maybeSingle();
  if (selectError) { console.error(selectError); alert('Could not post that — check the console for details.'); return; }
  const { error: writeError } = existing
    ? await supabase.from('wishes').update({ votes: existing.votes + 1 }).eq('id', existing.id)
    : await supabase.from('wishes').insert({ pops_id: currentPops.id, tag, kind: 'activity', category: selectedActivityCategory, votes: 1 });
  if (writeError) {
    console.error(writeError);
    // Most likely cause: the Phase 5 migration (wishes.category) hasn't been run yet.
    alert('Could not post that — check the console for details. If this is your first activity post, make sure the wishes.category migration has been run in Supabase.');
    return;
  }
  document.getElementById('activityForm').style.display = 'none';
  const { data: activityRows } = await supabase.from('wishes').select('*').eq('pops_id', currentPops.id).eq('kind', 'activity').order('votes', { ascending: false });
  profileActivities = activityRows || [];
  renderActivityGrid();
};

function sliderHTML(key, leftLabel, rightLabel, avgValue, invert) {
  const displayAvg = invert ? 100 - avgValue : avgValue;
  return '<div style="margin-bottom:14px">' +
    '<div class="slider-label"><span>' + leftLabel + '</span><span>' + rightLabel + '</span></div>' +
    '<div class="slider-track" id="track-' + key + '">' +
      '<div class="slider-avgdot" style="left:' + displayAvg + '%"></div>' +
      '<div class="slider-handle" id="handle-' + key + '" style="left:' + displayAvg + '%;display:none"></div>' +
    '</div></div>';
}

function attachSlider(key) {
  const track = document.getElementById('track-' + key);
  const handle = document.getElementById('handle-' + key);
  let dragging = false;

  function setFromClientX(clientX) {
    const rect = track.getBoundingClientRect();
    let pct = ((clientX - rect.left) / rect.width) * 100;
    pct = Math.max(0, Math.min(100, pct));
    handle.style.left = pct + '%';
    // Teal (the "good" end) is now on the right, so crowd is the one visually inverted —
    // its good value (low crowd, "Open Seating") sits near the teal-right end. safety/welcome
    // are direct now: their good/high value already sits near the teal-right end on its own.
    pendingRating[key] = key === 'crowd' ? Math.round(100 - pct) : Math.round(pct);
  }

  track.addEventListener('pointerdown', e => { dragging = true; setFromClientX(e.clientX); track.setPointerCapture(e.pointerId); });
  track.addEventListener('pointermove', e => { if (dragging) setFromClientX(e.clientX); });
  track.addEventListener('pointerup', () => { dragging = false; });
  track.addEventListener('pointercancel', () => { dragging = false; });
}

// Sliders start read-only (only the average dot shows) — dragging only becomes possible
// once "Add your read of the space!" is tapped, per the framework's explicit
// submission-state toggle (not always-draggable, which is what was built before).
window.startRatingSubmission = function () {
  document.getElementById('ratingStartWrap').style.display = 'none';
  document.getElementById('ratingSubmitForm').style.display = 'block';
  ['safety', 'crowd', 'welcome'].forEach(key => {
    document.getElementById('handle-' + key).style.display = 'block';
    attachSlider(key);
  });
};

window.showProfileTab = function (tab) {
  document.getElementById('tabHappening').style.display = tab === 'happening' ? 'block' : 'none';
  document.getElementById('tabSpace').style.display = tab === 'space' ? 'block' : 'none';
  document.getElementById('tabBtnHappening').classList.toggle('on', tab === 'happening');
  document.getElementById('tabBtnSpace').classList.toggle('on', tab === 'space');
};

window.submitVibeRating = async function () {
  if (!currentPops || !supabase) return;
  const better = (document.getElementById('betterInput').value || '').trim();
  const row = {
    pops_id: currentPops.id,
    safety: pendingRating.safety, crowd: pendingRating.crowd, welcome: pendingRating.welcome,
    lat: currentLocation ? currentLocation.lat : null, lng: currentLocation ? currentLocation.lng : null
  };
  await supabase.from('ratings').insert(row);
  await supabase.from('traces').insert({ pops_id: currentPops.id, type: 'rating', lat: row.lat, lng: row.lng });
  if (better) {
    await supabase.from('wishes').insert({ pops_id: currentPops.id, tag: better, kind: 'wish' });
  }
  window.openProfile(currentPops.id); // refresh in place so the new averages actually show
};

// ---------------- Tab 2: The Space ----------------

function renderSpaceTab(p) {
  const el = document.getElementById('tabSpace');
  const amenityWords = [...new Set(
    [].concat(p.amenities || [], p.amenities_required || [], p.permitted_amenities || [])
      .filter(a => a && String(a).toLowerCase() !== 'none' && !String(a).toLowerCase().includes('other'))
  )];
  el.innerHTML =
    '<p class="block-label" style="margin-top:8px">Address</p>' +
    '<p class="space-detail">' + (p.building_address || 'Not listed') + '</p>' +
    '<p class="block-label">Hours</p>' +
    '<p class="space-detail">' + (p.hours || 'Not listed') + '</p>' +
    '<p class="block-label">Amenities</p>' +
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">' +
      (amenityWords.length
        ? amenityWords.map(a => {
            const found = AMENITY_ICON_MAP.find(m => m.match.some(k => a.toLowerCase().includes(k)));
            return '<span class="amenity-pill">' + (found ? found.icon : '&#9642;') + ' ' + a + '</span>';
          }).join('')
        : '<span class="amenity-pill" style="color:#B0AEA6">None listed</span>') +
    '</div>' +
    '<p class="block-label">Share your spot</p>' +
    '<div id="mediaGallery" class="media-gallery"></div>' +
    '<div style="display:flex;gap:10px;margin-bottom:16px">' +
      '<label class="uploadbtn">Add a photo<input type="file" accept="image/*" onchange="window.uploadMedia(this,\'photo\')"/></label>' +
      '<label class="uploadbtn">Add a recording<input type="file" accept="audio/*" onchange="window.uploadMedia(this,\'recording\')"/></label>' +
    '</div>';
  renderMediaGallery();
}

function renderMediaGallery() {
  const wrap = document.getElementById('mediaGallery');
  if (!wrap) return;
  if (!profileMedia.length) {
    wrap.innerHTML = '<div class="media-thumb" style="color:#B0AEA6;font-size:11px;width:auto;padding:0 12px">Nothing shared yet</div>';
    return;
  }
  wrap.innerHTML = profileMedia.map(m => {
    if (m.type === 'photo' && supabase) {
      const url = supabase.storage.from('photos').getPublicUrl(m.storage_path).data.publicUrl;
      return '<div class="media-thumb" style="background-image:url(' + url + ')"></div>';
    }
    return '<div class="media-thumb">&#127925;</div>';
  }).join('');
}

window.uploadMedia = async function (inputEl, type) {
  const file = inputEl.files[0];
  if (!file || !currentPops || !supabase) return;
  const bucket = type === 'photo' ? 'photos' : 'recordings';
  const path = currentPops.id + '/' + Date.now() + '-' + file.name;
  const { error } = await supabase.storage.from(bucket).upload(path, file);
  if (error) { console.error(error); alert('Upload failed, try again.'); return; }
  const { data: row, error: insertError } = await supabase.from('media').insert({ pops_id: currentPops.id, type, storage_path: path }).select().single();
  if (insertError) { console.error(insertError); alert('Upload failed, try again.'); return; }
  profileMedia.unshift(row);
  renderMediaGallery();
  inputEl.value = '';
};

// ---------------- Look Inside / Live Activity ----------------

window.lookInside = function () {
  if (!currentPops) return;
  if (currentPops.scan_slug) {
    // Same-tab navigation, not a new tab — 3d-space/index.html reads the `pops` param to
    // build its own back button, which returns here via ?openProfile=<id> (see the deep-link
    // handling below enterApp).
    window.location.href = '3d-space/?scan=' + currentPops.scan_slug + '&pops=' + currentPops.id;
  } else {
    alert('3D space coming soon for ' + currentPops.name + '!');
  }
};

window.startLiveActivity = function () {
  if (!currentPops) return;
  if (!navigator.geolocation) { alert('Location services are not available on this device.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const meters = distanceMeters(pos.coords.latitude, pos.coords.longitude, currentPops.lat, currentPops.lng);
      if (meters > LIVE_ACTIVITY_RADIUS_METERS) {
        alert('You need to be at ' + currentPops.name + ' to post a live activity here.');
        return;
      }
      currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      window.openDropPin();
    },
    () => { alert('Could not get your location. Enable location access to post a live activity.'); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
};

window.backToList = function () {
  document.getElementById('profileView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  // On the ?openProfile deep-link path, the map + bottom sheet were initialized while
  // #listView was display:none (a zero-size container), so Leaflet cached 0x0 dimensions and
  // the sheet snapped against zero height. Now that the container is actually visible,
  // re-measure both (same pattern the window 'resize' handler already uses) and re-thin the
  // markers, which were thinned against degenerate map bounds. All harmless no-ops in the
  // normal pin-tap flow, where the map was already sized correctly.
  if (leafletMap) {
    leafletMap.invalidateSize();
    renderMapMarkers(thinMarkersForView(lastMapList), lastActivityTagsByPops, lastRecentlyActiveSet);
  }
  applySheetSnap(currentSheetSnap, false);
  // Drop the ?openProfile= param so the URL matches the map view — otherwise a reload here
  // would bounce straight back into that profile.
  if (location.search) history.replaceState(null, '', location.pathname + location.hash);
};

// Returning from 3d-space/'s back button (its goBackToApp navigates the same tab, not a new
// one) lands here with ?openProfile=<pops id> — skip onboarding and go straight back to that
// profile. This MUST run at the very end of the module: enterApp() synchronously calls
// loadMeetups()/loadList(), whose bodies touch module-level `let` state (activeMeetupsByPops,
// lastMapList, markerById, …) declared further down. Invoking enterApp() mid-module — where
// this block used to live — hit those bindings in their temporal dead zone, the async chain
// rejected, openProfile never ran, and the page went blank. Down here every declaration is
// initialized, exactly as it is when the "Let's go" button calls enterApp().
const deepLinkPopsId = new URLSearchParams(window.location.search).get('openProfile');
if (deepLinkPopsId) {
  // #listView has no default display:none, so hide it now to avoid a flash of the map/cards
  // before openProfile takes over.
  document.getElementById('listView').style.display = 'none';
  window.enterApp()
    .then(() => window.openProfile(deepLinkPopsId))
    .catch(err => console.error('Deep-link openProfile failed:', err));
}
</script>
