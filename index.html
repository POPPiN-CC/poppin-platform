const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWdqcHZubGRqd2ZhZGZrdXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NTU2NDQsImV4cCI6MjEwMDIzMTY0NH0.1Jbdo3ItPScvlJIW2fF2Wjkuv3hQh0S0dThxSnpsik8';

const VIBE_STOPS = [
  { at: 0,   color: [14, 165, 160] },
  { at: 25,  color: [31, 191, 107] },
  { at: 50,  color: [127, 191, 63] },
  { at: 75,  color: [217, 165, 33] },
  { at: 100, color: [232, 118, 61] }
];
function vibeColor(liveliness) {
  const v = Math.max(0, Math.min(100, liveliness));
  for (let i = 0; i < VIBE_STOPS.length - 1; i++) {
    const a = VIBE_STOPS[i], b = VIBE_STOPS[i + 1];
    if (v >= a.at && v <= b.at) {
      const t = (v - a.at) / (b.at - a.at);
      const rgb = a.color.map((c, idx) => Math.round(c + (b.color[idx] - c) * t));
      return 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
    }
  }
  return 'rgb(' + VIBE_STOPS[VIBE_STOPS.length - 1].color.join(',') + ')';
}

let currentPops = null;
let currentLocation = null;
let allPops = [];
let leafletMap = null;
let markerLayer = null;
let clusterLayer = null;
let meetupLayer = null;

const COMING_SOON_ICON = L.divIcon({
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#D4D2C8;border:2px solid #fff;opacity:0.85"></div>',

async function getAverages(popsId) {
  if (!supabase) return { safety: 50, crowd: 50, welcome: 50, count: 0 };
  const { data } = await supabase.from('ratings').select('safety,crowd,welcome').eq('pops_id', popsId);
  if (!data || data.length === 0) return { safety: 50, crowd: 50, welcome: 50, count: 0 };
  const n = data.length;
  const sum = data.reduce((a, r) => ({ safety: a.safety + r.safety, crowd: a.crowd + r.crowd, welcome: a.welcome + r.welcome }), { safety: 0, crowd: 0, welcome: 0 });
  return { safety: Math.round(sum.safety / n), crowd: Math.round(sum.crowd / n), welcome: Math.round(sum.welcome / n), count: n };
}

// Liveliness (what colors map pins) is meant to be a computed metric — crowdedness plus
// logged activity — not a raw slider. Using crowd alone as the proxy for now; folding in
// activity/trace counts is tracked as later polish, not done here.
function computeLiveliness(avg) {
  return avg.crowd;
}

// Real straight-line distance in meters (Haversine), then a rough walking-minutes
// estimate at an average pace. This is what makes the "10-minute vibe check" header
// an honest claim rather than a decorative one, it only shows when it's actually true.
const WALK_METERS_PER_MINUTE = 80; // ~4.8 km/h average walking pace
function distanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function walkMinutesTo(pop) {
  if (!currentLocation || pop.lat == null || pop.lng == null) return null;
  const meters = distanceMeters(currentLocation.lat, currentLocation.lng, pop.lat, pop.lng);
  return meters / WALK_METERS_PER_MINUTE;
}

function initMap() {
  if (leafletMap) return;
  leafletMap = L.map('mapEl', { zoomControl: false }).setView([40.74, -73.96], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
  }).addTo(leafletMap);
  markerLayer = L.layerGroup().addTo(leafletMap);
  clusterLayer = L.markerClusterGroup({
    maxClusterRadius: 50,
    iconCreateFunction: function (cluster) {
      const count = cluster.getChildCount();
      const size = count > 100 ? 40 : count > 20 ? 32 : 24;
      return L.divIcon({
        html: '<div class="cluster-blob" style="width:' + size + 'px;height:' + size + 'px;font-size:' + (size > 30 ? 11 : 9) + 'px">' + count + '</div>',
        className: '', iconSize: [size, size]
      });
    }
  }).addTo(leafletMap);
  meetupLayer = L.layerGroup().addTo(leafletMap);
}

  { match: ['lunch', 'food', 'coffee'], icon: '☕' }
];
function iconForActivity(topTag) {
  if (!topTag) return null;
  const lower = topTag.toLowerCase();
  const found = ACTIVITY_ICONS.find(a => a.match.some(m => lower.includes(m)));
  return found ? found.icon : null;
}

async function getTopActivity(popsId) {
  if (!supabase) return null;
  const { data } = await supabase.from('wishes').select('tag').eq('pops_id', popsId).eq('kind', 'activity').order('votes', { ascending: false }).limit(1);
  return data && data[0] ? data[0].tag : null;
}

async function wasRecentlyActive(popsId) {
  if (!supabase) return false;
  const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
  const { data } = await supabase.from('traces').select('id').eq('pops_id', popsId).gt('created_at', oneHourAgo).limit(1);
  return !!(data && data.length > 0);
}

function activePinIcon(color, ratingCount, activityIcon, isPulsing) {
  const size = Math.min(24 + Math.round(ratingCount * 1.5), 44);
  const emoji = activityIcon ? '<span style="font-size:' + Math.round(size * 0.45) + 'px;line-height:1">' + activityIcon + '</span>' : '';
  const pulse = isPulsing ? '<div class="pulse-ring" style="--ring-color:' + color + '"></div>' : '';
  return L.divIcon({
    html: '<div style="position:relative;width:' + size + 'px;height:' + size + 'px">' + pulse +
      '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.25)">' + emoji + '</div></div>',
    className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2]
  });
}

async function renderMapMarkers(activeList, comingSoonList) {
  if (!markerLayer || !clusterLayer) return;
  markerLayer.clearLayers();
  clusterLayer.clearLayers();
  const allPoints = [];

  for (const p of activeList) {
    if (p.lat == null || p.lng == null) continue;
    const [topTag, recent] = await Promise.all([getTopActivity(p.id), wasRecentlyActive(p.id)]);
    const icon = activePinIcon(p._color, p._count || 0, iconForActivity(topTag), recent);
    const marker = L.marker([p.lat, p.lng], { icon }).addTo(markerLayer);
    marker.on('click', () => window.openProfile(p.id));
    allPoints.push([p.lat, p.lng]);
  }

  comingSoonList.forEach(p => {
    if (p.lat == null || p.lng == null) return;
    const marker = L.marker([p.lat, p.lng], { icon: COMING_SOON_ICON });
    marker.on('click', () => window.showComingSoon(p.name));
    clusterLayer.addLayer(marker);
    allPoints.push([p.lat, p.lng]);
  });

  if (allPoints.length > 0 && leafletMap) {
    leafletMap.fitBounds(allPoints, { padding: [20, 20] });
  }
}

async function loadList(searchText) {
  const wrap = document.getElementById('listCards');
  if (!supabase) {
    wrap.innerHTML = '<p class="empty">POPPIN isn\'t connected to a database yet. Add your Supabase project URL and anon key at the top of the script to see real spaces here.</p>';
    return;
  }
  wrap.innerHTML = '<p class="empty">Loading nearby spaces...</p>';
  const { data, error } = await supabase.from('pops').select('*').order('name');
  if (error) { wrap.innerHTML = '<p class="empty">Could not load spaces. Check your Supabase config.</p>'; return; }
  allPops = data || [];

  // Map shows everything: active pins in real vibe color, coming-soon pins muted gray.
  const activeOnly = allPops.filter(p => p.status === 'active');
  const comingSoon = allPops.filter(p => p.status !== 'active');
  const activeRows = await Promise.all(activeOnly.map(async p => ({ p, avg: await getAverages(p.id) })));
  await renderMapMarkers(
    activeRows.map(r => Object.assign({}, r.p, { _color: vibeColor(computeLiveliness(r.avg)), _count: r.avg.count })),
    comingSoon
  );

  // List only shows active, tappable spaces, no dead ends in the actual list.
  const filtered = searchText ? activeRows.filter(r => r.p.name.toLowerCase().includes(searchText.toLowerCase())) : activeRows;

  const titleEl = document.getElementById('sectionTitle');
  const withinTenMin = filtered.filter(r => {
    const mins = walkMinutesTo(r.p);
    return mins !== null && mins <= 10;
  });
  if (currentLocation && filtered.length > 0 && withinTenMin.length === filtered.length) {
    const n = withinTenMin.length;
    titleEl.textContent = n + (n === 1 ? ' spot' : ' spots') + ' within a 10-minute vibe check';
  } else {
    titleEl.textContent = 'POPS I can walk to';
  }

  if (filtered.length === 0) {
    wrap.innerHTML = '<p class="empty">No active spaces match yet. The map above shows every real POPS, more get activated as the pilot grows.</p>';
    return;
  }
  wrap.innerHTML = filtered.map(({ p, avg }) => {
    const liveliness = computeLiveliness(avg);
    const color = vibeColor(liveliness);
    const vibeWord = liveliness < 35 ? 'Quiet' : liveliness < 65 ? 'Balanced' : 'Lively';
    const crowdWord = avg.crowd < 45 ? 'Not crowded' : avg.crowd < 70 ? 'Some seats' : 'Crowded';
    return '<button class="card" onclick="window.openProfile(\'' + p.id + '\')">' +
      '<div class="accentbar" style="background:' + color + '"></div>' +
      '<div style="flex:1"><p class="cname">' + p.name + '</p>' +
      '<p class="cmeta">' + vibeWord + ' &middot; ' + crowdWord + '</p></div>' +
      '<span class="pct" style="background:' + color + '22;color:' + color + '">' + avg.welcome + '%</span>' +
      '</button>';
  }).join('');
}

window.postMeetup = async function (popsId) {
  if (!supabase) { alert('Connect Supabase first to post a live pin.'); return; }
  const activity = document.getElementById('activityName').value.trim();
  const message = document.getElementById('activityMsg').value.trim();
  let durationMin = parseInt(document.getElementById('activityDuration').value, 10);
  if (!activity) { alert('Give it a name first.'); return; }
  if (selectedPostType === 'photo' && durationMin > 30) durationMin = 30; // photo posts never outlive their "right now" claim

  const expiresAt = new Date(Date.now() + durationMin * 60 * 1000).toISOString();
  const row = {
    pops_id: popsId, activity, message,
    post_type: selectedPostType,
    icon: selectedPostType === 'icon' ? selectedIcon : null,
    lat: currentLocation ? currentLocation.lat : null,
    lng: currentLocation ? currentLocation.lng : null,
    expires_at: expiresAt
  };

  if (selectedPostType === 'photo' && selectedPhotoFile) {
    const path = popsId + '/' + Date.now() + '-' + selectedPhotoFile.name;
    const { error: upErr } = await supabase.storage.from('meetup-photos').upload(path, selectedPhotoFile);
    if (upErr) { alert('Photo upload failed, try again.'); return; }
    row.photo_path = path;
  }

  const { error } = await supabase.from('meetups').insert(row);
  if (error) { alert('Could not post. Try again.'); return; }
  window.closeDropPin();
  loadMeetups();
};

function sliderHTML(key, leftLabel, rightLabel, avgValue, invert) {
  const displayAvg = invert ? 100 - avgValue : avgValue;
  return '<div style="margin-bottom:14px">' +
    '<div class="slider-label"><span>' + leftLabel + '</span><span>' + rightLabel + '</span></div>' +
    '<div class="slider-track" id="track-' + key + '">' +
      '<div class="slider-avgdot" style="left:' + displayAvg + '%"></div>' +
      '<div class="slider-handle" id="handle-' + key + '" style="left:' + displayAvg + '%"></div>' +
    '</div></div>';
}

function attachSlider(key) {
  const track = document.getElementById('track-' + key);
  const handle = document.getElementById('handle-' + key);
  let dragging = false;

  function setFromClientX(clientX) {
    const rect = track.getBoundingClientRect();
    let pct = ((clientX - rect.left) / rect.width) * 100;
    pct = Math.max(0, Math.min(100, pct));
    handle.style.left = pct + '%';
    pendingRating[key] = key === 'welcome' ? Math.round(100 - pct) : Math.round(pct);
  }

  track.addEventListener('pointerdown', e => { dragging = true; setFromClientX(e.clientX); track.setPointerCapture(e.pointerId); });
  track.addEventListener('pointermove', e => { if (dragging) setFromClientX(e.clientX); });
  track.addEventListener('pointerup', () => { dragging = false; });
  track.addEventListener('pointercancel', () => { dragging = false; });
}

      '<button onclick="window.addWish()" style="border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:0 12px;font-family:var(--font-body);font-size:11px;cursor:pointer">Add</button>' +
    '</div>' +
    '<p style="font-family:var(--font-display);font-size:10.5px;font-weight:700;color:#9A9A94;letter-spacing:0.5px;text-transform:uppercase;margin:0 0 8px">Share your spot</p>' +
    '<div style="display:flex;gap:8px;margin-bottom:16px">' +
      '<label class="uploadbtn">Add a photo<input type="file" accept="image/*" onchange="window.uploadMedia(this,\'photo\')"/></label>' +
      '<label class="uploadbtn">Add a recording<input type="file" accept="audio/*" onchange="window.uploadMedia(this,\'recording\')"/></label>' +
    '</div>';
}

window.tapWish = async function (tag) {
  if (!supabase || !currentPops) return;
  const { data } = await supabase.from('wishes').select('*').eq('pops_id', currentPops.id).eq('tag', tag).eq('kind', 'wish').maybeSingle();
  if (data) await supabase.from('wishes').update({ votes: data.votes + 1 }).eq('id', data.id);
  window.openProfile(currentPops.id);
  window.showProfileTab('details');
};

window.addWish = async function () {
  if (!supabase || !currentPops) return;
  const input = document.getElementById('wishInput');
  const val = input.value.trim();
  if (!val) return;
  const { data: existing } = await supabase.from('wishes').select('*').eq('pops_id', currentPops.id).eq('tag', val).eq('kind', 'wish').maybeSingle();
  if (existing) {
    await supabase.from('wishes').update({ votes: existing.votes + 1 }).eq('id', existing.id);
  } else {
    await supabase.from('wishes').insert({ pops_id: currentPops.id, tag: val, kind: 'wish', votes: 1 });
  }
  window.openProfile(currentPops.id);
  window.showProfileTab('details');
};

window.uploadMedia = async function (inputEl, type) {
  const file = inputEl.files[0];
  if (!file || !currentPops || !supabase) return;
  const bucket = type === 'photo' ? 'photos' : 'recordings';
  const path = currentPops.id + '/' + Date.now() + '-' + file.name;
  const { error } = await supabase.storage.from(bucket).upload(path, file);
  if (error) { alert('Upload failed, try again.'); return; }
  await supabase.from('media').insert({ pops_id: currentPops.id, type, storage_path: path });
  alert(type === 'photo' ? 'Photo added' : 'Recording added');
};

window.backToList = function () {
  document.getElementById('profileView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
};
</script>
</body>
</html>
