<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POPPIN — scan viewer test (pin placement)</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;color:#fff}
  #hud{position:fixed;top:12px;left:12px;right:12px;z-index:10;background:rgba(0,0,0,0.65);
       border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.5;pointer-events:none}
  #hud b{color:#DE5B3E}
  #coords{position:fixed;bottom:12px;left:12px;right:12px;z-index:10;background:rgba(0,0,0,0.75);
       border-radius:10px;padding:12px 16px;font-size:13px;font-family:Consolas,monospace}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
       background:#111;z-index:20;font-size:14px;color:#aaa}
  canvas{display:block}
</style>
</head>
<body>
<div id="loading">Loading Cornell Tech scan...</div>
<div id="hud">Tap anywhere on the scan to drop a test pin. This confirms the exact 3D coordinate a real "drop a pin" feature would capture. Drag to orbit, scroll to zoom.</div>
<div id="coords">No pin placed yet.</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(3, 3, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

let scanRoot = null;
const pinMarkers = [];

const loader = new GLTFLoader();
loader.load('cornell-tech-scan.glb', (gltf) => {
  scanRoot = gltf.scene;
  scene.add(scanRoot);

  // Center and frame the scan automatically, scans can come in at any scale or offset
  const box = new THREE.Box3().setFromObject(scanRoot);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  scanRoot.position.sub(center);
  const maxDim = Math.max(size.x, size.y, size.z);
  camera.position.set(maxDim * 0.8, maxDim * 0.6, maxDim * 0.8);
  controls.target.set(0, 0, 0);
  controls.update();

  document.getElementById('loading').style.display = 'none';
}, (progress) => {
  if (progress.total) {
    const pct = Math.round((progress.loaded / progress.total) * 100);
    document.getElementById('loading').textContent = 'Loading Cornell Tech scan... ' + pct + '%';
  }
}, (error) => {
  document.getElementById('loading').textContent = 'Could not load the scan. Check the console for details.';
  console.error(error);
});

// This is the actual mechanism a real "drop a pin" feature would use:
// raycast the tap into the scene, find exactly where it hit the real geometry.
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function placePinAt(clientX, clientY) {
  if (!scanRoot) return;
  pointer.x = (clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObject(scanRoot, true);
  if (hits.length === 0) {
    document.getElementById('coords').textContent = 'No surface hit there, try tapping directly on the scan.';
    return;
  }
  const point = hits[0].point;

  const marker = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xDE5B3E })
  );
  marker.position.copy(point);
  scene.add(marker);
  pinMarkers.push(marker);

  document.getElementById('coords').innerHTML =
    'Pin placed at scan-local coordinate:<br>' +
    'x: ' + point.x.toFixed(3) + '  y: ' + point.y.toFixed(3) + '  z: ' + point.z.toFixed(3) +
    '<br><span style="color:#888">This x/y/z is exactly what would be saved to the meetups table instead of lat/lng.</span>';
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  renderer.domElement.dataset.downX = e.clientX;
  renderer.domElement.dataset.downY = e.clientY;
});
renderer.domElement.addEventListener('pointerup', (e) => {
  const dx = Math.abs(e.clientX - renderer.domElement.dataset.downX);
  const dy = Math.abs(e.clientY - renderer.domElement.dataset.downY);
  if (dx < 4 && dy < 4) placePinAt(e.clientX, e.clientY); // treat as a tap, not a drag
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
